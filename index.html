    <style>
        /* Native App Feel Resets */
        body {
            font-family: 'Space Grotesk', 'Noto Sans Thai', sans-serif;
            background-color: #f0fdf4;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            overflow: hidden;
        }

        /* Mobile Container */
        #app-container {
            max-width: 430px;
            margin: 0 auto;
            height: 100vh;
            height: 100dvh;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 3D UI DESIGN SYSTEM */
        .btn-3d {
            border: 3px solid #1f2937;
            border-radius: 16px;
            box-shadow: 4px 6px 0px #1f2937;
            transition: all 0.1s ease;
            position: relative;
            font-weight: 700;
        }
        .btn-3d:active {
            box-shadow: 0px 0px 0px #1f2937;
            transform: translate(4px, 6px);
        }
        
        /* Smaller 3D button for lists */
        .btn-sm-3d {
            border: 2px solid #1f2937;
            border-radius: 10px;
            box-shadow: 2px 3px 0px #1f2937;
            transition: all 0.1s ease;
            font-weight: 700;
        }
        .btn-sm-3d:active {
            box-shadow: 0px 0px 0px #1f2937;
            transform: translate(2px, 3px);
        }

        .card-3d {
            border: 2px solid #1f2937;
            border-radius: 12px;
            box-shadow: 4px 4px 0px #1f2937;
            background-color: #ffffff;
            margin-bottom: 16px;
        }

        /* Isometric Map */
        .iso-container { perspective: 1000px; padding: 40px 0; display: flex; justify-content: center; overflow: visible; }
        .iso-grid {
            display: grid; grid-template-columns: repeat(3, 60px); gap: 20px;
            transform: rotateX(60deg) rotateY(0deg) rotateZ(-45deg); transform-style: preserve-3d;
        }
        .iso-cube {
            width: 60px; height: 60px; background: #e5e7eb; border: 2px solid #1f2937; position: relative;
            transition: all 0.3s ease; box-shadow: -5px 5px 0px rgba(0,0,0,0.1);
        }
        .iso-cube.active {
            background: #4ade80; transform: translateZ(20px) translate(-5px, -5px);
            box-shadow: -10px 10px 0px #166534, inset 0 0 10px rgba(255,255,255,0.5); border-color: #14532d;
        }
        .iso-cube.active::before, .iso-cube.active::after { content: ''; position: absolute; border: 2px solid #14532d; background: #22c55e; }
        .iso-cube.active::before { width: 20px; height: 100%; top: 0; left: -22px; transform-origin: right; transform: skewY(-45deg); }
        .iso-cube.active::after { width: 100%; height: 20px; bottom: -22px; left: 0; transform-origin: top; transform: skewX(-45deg); }

        /* Toggles */
        .toggle-checkbox:checked { right: 0; border-color: #4ade80; }
        .toggle-checkbox:checked + .toggle-label { background-color: #4ade80; }
        .toggle-label { transition: background-color 0.2s; border: 2px solid #1f2937; box-shadow: 2px 2px 0px #1f2937; }
        .toggle-checkbox { right: 0; z-index: 1; border: 2px solid #1f2937; }
    </style>

        const state = {

        // 3. Application Core Controller
        const App = {
            modules: [],

            init: function() { this.renderLogin(); },
            registerModule: function(module) { this.modules.push(module); },

            toggleLanguage: function() {
                state.language = state.language === 'en' ? 'th' : 'en';
                document.getElementById('lang-indicator').innerText = state.language === 'en' ? 'EN' : 'TH';
                // Re-render current view to apply language changes
                this.navigate(state.currentView, state.currentModuleId);
            },

            login: function(userId) {
                state.currentUser = db.users.find(u => u.id === userId);
                const profile = document.getElementById('header-profile');
                profile.classList.remove('hidden');
                profile.textContent = state.currentUser.initials;
                profile.className = `hidden h-10 w-10 rounded-full border-2 border-gray-800 flex items-center justify-center font-bold text-lg shadow-[2px_2px_0_0_#1f2937] cursor-pointer ${state.currentUser.color}`;
                profile.classList.remove('hidden');
                
                if (state.currentUser.role === 'owner') this.navigate('owner_dashboard');
                else this.navigate('employee_home');
            },

            logout: function() {
                state.currentUser = null;
                document.getElementById('header-profile').classList.add('hidden');
                document.getElementById('app-nav').classList.add('hidden');
                this.navigate('login');
            },

            navigate: function(view, moduleId = null) {
                state.currentView = view;
                state.currentModuleId = moduleId;
                const content = document.getElementById('app-content');
                content.innerHTML = ''; 
                content.scrollTop = 0;

                if (view === 'login') {
                    this.renderLogin();
                    document.getElementById('app-nav').classList.add('hidden');
                    document.getElementById('header-title').innerText = "WorkFlow";
                } else if (view === 'owner_dashboard') {
                    this.renderOwnerDashboard();
                    this.renderNav();
                    document.getElementById('header-title').innerText = t('dashboard');
                } else if (view === 'employee_home') {
                    this.renderEmployeeHome();
                    this.renderNav();
                    document.getElementById('header-title').innerText = t('my_portal');
                } else if (view === 'settings') {
                    this.renderSettings();
                    this.renderNav();
                    document.getElementById('header-title').innerText = t('app_settings');
                } else if (view === 'module' && moduleId) {
                    const mod = this.modules.find(m => m.id === moduleId);
                    if (mod && state.features[mod.id]) {
                        content.innerHTML = mod.renderUserView();
                        document.getElementById('header-title').innerText = t(mod.nameKey);
                        if(mod.onLoad) mod.onLoad();
                    }
                    this.renderNav();
                }
            },

                        <p class="text-gray-500">${t('what_to_do')}</p>

                    if (state.features[mod.id] && mod.renderWidget) html += mod.renderWidget();
                });

                    if (state.features[mod.id] && mod.onWidgetLoad) setTimeout(() => mod.onWidgetLoad(), 0);

                        </div>

                        <!-- ISOMETRIC OFFICE MAP -->
                        <div class="card-3d bg-blue-50 overflow-hidden relative">

                            <div class="iso-container">

                const employees = db.users.filter(u => u.role !== 'owner');

                        html += `<div class="iso-cube active flex items-center justify-center"><span class="text-xs font-bold text-white transform -rotate-45">${emp.initials}</span></div>`;

                    } else {

                html += `</div></div><p class="text-xs text-center text-gray-500 pb-4">${t('floor_plan_desc')}</p></div>`;

                // Render Admin Widgets from Modules
                this.modules.forEach(mod => {
                    if (state.features[mod.id] && mod.renderAdminWidget) {
                        html += mod.renderAdminWidget();

                html += `</div>`;

            renderSettings: function() {

                                <input type="checkbox" id="toggle-${mod.id}" ${isChecked} class="toggle-checkbox absolute block w-8 h-8 rounded-full bg-white appearance-none cursor-pointer" onchange="App.toggleFeature('${mod.id}', this.checked)"/>

                                <i class="ph-bold ph-sign-out"></i> ${t('switch_user')}
                             </button>
                        </div>
                    </div>

                content.innerHTML = html;
            },

            toggleFeature: function(moduleId, isEnabled) {
                state.features[moduleId] = isEnabled;
                this.renderNav();
                // Refresh view if owner dashboard
                if(state.currentView === 'owner_dashboard') this.renderOwnerDashboard();
            },

            renderNav: function() {
                const nav = document.getElementById('app-nav');
                if (!state.currentUser) return;
                nav.classList.remove('hidden');
                let html = '';

                const createNavItem = (icon, labelKey, targetView, targetModule, isActive) => {
                    const clickAction = targetModule ? `App.navigate('${targetView}', '${targetModule}')` : `App.navigate('${targetView}')`;
                    return `
                    <button onclick="${clickAction}" class="flex flex-col items-center justify-center p-2 min-w-[64px] flex-shrink-0 transition-transform ${isActive ? 'text-gray-900 transform -translate-y-1' : 'text-gray-400'}">
                        <div class="relative">
                            <i class="${isActive ? 'ph-fill' : 'ph'} ${icon} text-3xl mb-1 drop-shadow-sm"></i>
                            ${isActive ? '<div class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-1.5 h-1.5 bg-gray-900 rounded-full"></div>' : ''}
                        </div>
                        <span class="text-[10px] font-bold mt-1">${t(labelKey)}</span>
                    </button>
                `};

                if (state.currentUser.role === 'owner') {
                    html += createNavItem('ph-squares-four', 'overview', 'owner_dashboard', null, state.currentView === 'owner_dashboard');
                    html += createNavItem('ph-faders', 'features', 'settings', null, state.currentView === 'settings');
                } else {
                    html += createNavItem('ph-house', 'home', 'employee_home', null, state.currentView === 'employee_home');
                    
                    this.modules.forEach(mod => {
                        if (state.features[mod.id] && mod.hasUserTab) {
                            const isModActive = state.currentView === 'module' && state.currentModuleId === mod.id;
                            html += createNavItem(mod.icon, mod.nameKey, 'module', mod.id, isModActive);
                        }
                    });
                }
                nav.innerHTML = html;
            }
        };

        // --- HELPER FUNCTIONS ---
        function isClockedIn(userId) {
            const userLogs = db.logs.filter(l => l.userId === userId).sort((a,b) => new Date(b.time) - new Date(a.time));
            if (userLogs.length === 0) return false;
            return userLogs[0].type === 'IN';
        }
        function formatTime(isoString) {
            return new Date(isoString).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }


        // =========================================
        // MODULE 1: TIME TRACKING 
        // =========================================
        const TimeTrackerModule = {
            id: 'timeClock', nameKey: 'mod_time', descKey: 'mod_time_desc', icon: 'ph-clock-countdown', hasUserTab: false,

            renderWidget: function() {
                const isWorking = isClockedIn(state.currentUser.id);
                const btnClass = isWorking ? "bg-red-400 shadow-[4px_6px_0_0_#991b1b] border-[#7f1d1d] text-white" : "bg-green-400 shadow-[4px_6px_0_0_#166534] border-[#14532d] text-white";
                const btnIcon = isWorking ? "ph-sign-out" : "ph-sign-in";
                const statusText = isWorking ? t("clocked_in") : t("clocked_out");
                const btnText = isWorking ? t("btn_clock_out") : t("btn_clock_in");
                return `
                    <div class="card-3d p-6 text-center" id="time-widget-container">
                        <div class="flex justify-between items-center mb-6">
                            <div class="text-left">
                                <h3 class="text-xl font-bold">${statusText}</h3>
                                <p class="text-sm text-gray-500 font-bold" id="live-clock">--:--:--</p>
                            </div>
                            <div class="w-12 h-12 bg-gray-100 rounded-full border-2 border-gray-800 flex items-center justify-center shadow-inner">
                                <i class="ph-fill ph-clock text-2xl text-gray-800"></i>
                            </div>
                        </div>
                        <button onclick="TimeTrackerModule.toggleClock()" class="btn-3d w-full py-4 text-lg tracking-wider flex items-center justify-center gap-3 ${btnClass}">
                            <i class="ph-bold ${btnIcon} text-xl"></i> ${btnText}
                        </button>
                    </div>
                `;
            },
            onWidgetLoad: function() {
                const updateTime = () => { if(document.getElementById('live-clock')) document.getElementById('live-clock').innerText = new Date().toLocaleTimeString(); };
                updateTime();
                if(this.timer) clearInterval(this.timer);
                this.timer = setInterval(updateTime, 1000);
            },
            toggleClock: function() {
                db.logs.push({ id: Date.now(), userId: state.currentUser.id, type: isClockedIn(state.currentUser.id) ? 'OUT' : 'IN', time: new Date().toISOString() });
                App.renderEmployeeHome();
            },
            renderAdminWidget: function() {
                const recentLogs = [...db.logs].sort((a,b) => new Date(b.time) - new Date(a.time)).slice(0, 4);
                let html = `<div class="card-3d p-4"><h3 class="font-bold border-b-2 border-gray-100 pb-2 mb-3 flex items-center gap-2"><i class="ph-fill ph-clock-counter-clockwise"></i> ${t('time_logs')}</h3><div class="space-y-3">`;
                if(recentLogs.length === 0) html += `<p class="text-gray-500 text-center py-2 text-sm">${t('no_activity')}</p>`;
                recentLogs.forEach(log => {
                    const user = db.users.find(u => u.id === log.userId);
                    html += `
                        <div class="flex items-center justify-between hover:bg-gray-50 rounded transition-colors">
                            <div class="flex items-center gap-3">
                                <div class="w-6 h-6 rounded-full border border-gray-800 ${user.color} flex items-center justify-center text-[10px] font-bold">${user.initials}</div>
                                <div class="text-sm font-bold">${user.name} <span class="${log.type === 'OUT' ? 'text-red-500' : 'text-green-500'}">${log.type}</span></div>

                            <div class="text-xs text-gray-500 font-bold">${formatTime(log.time)}</div>
                        </div>`;
                });
                return html + `</div></div>`;

            renderUserView: function() {

                                <i class="ph-bold ph-plus"></i>

        // =========================================

        const TimeOffModule = {

    const PollsModule = {
        id: 'polls', nameKey: 'mod_polls', descKey: 'mod_polls_desc', icon: 'ph-chart-bar', hasUserTab: true,

        renderUserView: function() {
            const activePolls = [...db.polls].reverse();
            let html = `
                <div class="space-y-6 pb-20">
                    <div>
                        <h2 class="text-2xl font-bold">${t('mod_polls')}</h2>
                        <p class="text-gray-500">${t('have_say')}</p>

            `;

            if(activePolls.length === 0) { html += `<div class="text-center text-gray-400 py-6"><p>${t('no_polls')}</p></div>`; }

            activePolls.forEach(poll => {
                let userVoted = false; let totalVotes = 0;
                poll.options.forEach(opt => {
                    totalVotes += opt.votes.length;
                    if(opt.votes.includes(state.currentUser.id)) userVoted = true;
                });

                html += `
                    <div class="card-3d p-5 bg-white">
                        <div class="flex items-start gap-3 mb-4">
                            <i class="ph-fill ph-chart-bar text-indigo-500 text-2xl mt-1"></i>
                            <div>
                                <h3 class="font-bold text-lg leading-tight text-gray-800">${poll.question}</h3>
                                <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mt-1">${totalVotes} ${t('votes_total')}</div>
                            </div>
                        </div>
                        <div class="space-y-2">
                `;

                poll.options.forEach((opt, index) => {
                    const pct = totalVotes > 0 ? Math.round((opt.votes.length / totalVotes) * 100) : 0;
                    const isMyVote = opt.votes.includes(state.currentUser.id);
                    
                    if (userVoted) {
                        const barColor = isMyVote ? 'bg-indigo-400' : 'bg-gray-200';
                        const textColor = isMyVote ? 'font-bold text-indigo-900' : 'text-gray-600';
                        html += `
                            <div class="relative w-full h-10 bg-gray-50 rounded-lg border-2 border-gray-800 overflow-hidden flex items-center px-3 z-0">
                                <div class="absolute top-0 left-0 h-full ${barColor} transition-all duration-1000 -z-10 border-r-2 border-gray-800" style="width: ${pct}%"></div>
                                <div class="flex justify-between w-full text-sm z-10 ${textColor}">
                                    <span>${opt.text} ${isMyVote ? '<i class="ph-bold ph-check ml-1"></i>' : ''}</span>
                                    <span class="font-bold">${pct}%</span>
                                </div>
                            </div>
                        `;
                    } else {
                        html += `
                            <button onclick="PollsModule.castVote(${poll.id}, ${index})" class="btn-sm-3d w-full bg-white hover:bg-indigo-50 py-2 px-4 text-left flex justify-between items-center transition-colors">
                                <span class="font-bold text-gray-700">${opt.text}</span>
                                <i class="ph-bold ph-circle text-gray-300"></i>
                            </button>
                        `;
                    }
                });
                html += `</div></div>`;
            });
            html += `</div></div>`;
            return html;
        },

        castVote: function(pollId, optionIndex) {
            const poll = db.polls.find(p => p.id === pollId);
            if(poll && !poll.options.some(o => o.votes.includes(state.currentUser.id))) {
                poll.options[optionIndex].votes.push(state.currentUser.id);
                App.navigate('module', 'polls');
            }
        },

        renderAdminWidget: function() {
            const activePolls = [...db.polls].reverse().slice(0,2);
            let html = `
                <div class="card-3d p-4 bg-indigo-50">
                    <div class="flex justify-between items-center border-b-2 border-gray-800 pb-2 mb-3">
                        <h3 class="font-bold flex items-center gap-2"><i class="ph-fill ph-chart-bar text-indigo-500"></i> ${t('live_polls')}</h3>
                    </div>
                    
                    <div class="mb-4 space-y-2">
                        <input type="text" id="poll-question" placeholder="${t('ask_team')}" class="w-full border-2 border-gray-800 rounded-lg px-2 py-1 text-sm outline-none focus:bg-white bg-transparent font-bold">
                        <input type="text" id="poll-options" placeholder="${t('options_comma')}" class="w-full border-2 border-gray-800 rounded-lg px-2 py-1 text-sm outline-none focus:bg-white bg-transparent">
                        <button onclick="PollsModule.createPoll()" class="btn-sm-3d w-full bg-indigo-400 text-white py-1 text-xs flex items-center justify-center gap-1">
                            <i class="ph-bold ph-plus"></i> ${t('create_poll')}
                        </button>
                    </div>

                    <div class="space-y-3 border-t-2 border-gray-800 border-dashed pt-3">
            `;

            if(activePolls.length === 0) {
                html += `<p class="text-xs text-gray-500 text-center py-2">${t('no_polls')}</p>`;
            } else {
                activePolls.forEach(poll => {
                    let total = 0;
                    poll.options.forEach(o => total += o.votes.length);
                    let leading = poll.options.reduce((prev, current) => (prev.votes.length > current.votes.length) ? prev : current);

                    html += `
                        <div class="bg-white border-2 border-gray-800 rounded-xl p-3 shadow-[2px_2px_0_0_#1f2937]">
                            <div class="text-sm font-bold text-gray-800 leading-tight mb-1">${poll.question}</div>
                            <div class="flex justify-between items-end">
                                <div class="text-xs text-gray-600">
                                    ${t('leading')}: <span class="font-bold text-indigo-600">${total > 0 ? leading.text : t('none_yet')}</span>
                                </div>
                                <span class="bg-gray-100 px-2 py-0.5 rounded text-[10px] font-bold border border-gray-300">${total} ${t('votes')}</span>
                            </div>
                        </div>
                    `;
                });
            }
            html += `</div></div>`;
            return html;
        },

        createPoll: function() {
            const q = document.getElementById('poll-question').value.trim();
            const optString = document.getElementById('poll-options').value.trim();
            if(q && optString) {
                const optArray = optString.split(',').map(s => s.trim()).filter(s => s.length > 0);
                if(optArray.length >= 2) {
                    const formattedOptions = optArray.map(text => ({ text: text, votes: [] }));
                    db.polls.push({ id: Date.now(), question: q, options: formattedOptions, status: 'active', date: new Date().toISOString() });
                    App.renderOwnerDashboard();
                } else {
                    alert("Please provide at least 2 options.");
                }
            }
        }
    };

                    </div>
                    
                    <div class="mb-4 space-y-2">
                        <input type="text" id="evt-title" placeholder="${t('event_name')}" class="w-full border-2 border-gray-800 rounded-lg px-2 py-1 text-sm outline-none focus:bg-white bg-transparent font-bold">
                        <div class="flex gap-2">
                            <input type="date" id="evt-date" class="flex-1 border-2 border-gray-800 rounded-lg px-2 py-1 text-sm outline-none focus:bg-white bg-transparent">
                            <select id="evt-type" class="border-2 border-gray-800 rounded-lg px-1 text-sm bg-transparent outline-none">
                                <option value="general">General</option>
                                <option value="meeting">Meeting</option>
                                <option value="party">Party</option>
                            </select>
                        </div>
                        <button onclick="EventsModule.createEvent()" class="btn-sm-3d w-full bg-teal-400 text-white py-1 text-xs flex items-center justify-center gap-1">
                            <i class="ph-bold ph-plus"></i> ${t('add_event')}
                        </button>
                    </div>

                    <div class="space-y-3 border-t-2 border-gray-800 border-dashed pt-3">
            `;

            if(upcomingEvents.length === 0) {
                html += `<p class="text-xs text-gray-500 text-center py-2">${t('no_events')}</p>`;
            } else {
                upcomingEvents.forEach(evt => {
                    const eventDate = new Date(evt.date);
                    html += `
                        <div class="bg-white border-2 border-gray-800 rounded-xl p-3 shadow-[2px_2px_0_0_#1f2937] flex items-center justify-between">
                            <div>
                                <div class="text-sm font-bold text-gray-800 leading-tight">${evt.title}</div>
                                <div class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">${eventDate.toLocaleDateString(state.language === 'th' ? 'th-TH' : 'en-US')}</div>
                            </div>
                            <div class="bg-gray-100 px-2 py-1 rounded text-[10px] font-bold border border-gray-300 flex items-center gap-1">
                                <i class="ph-fill ph-users text-teal-500"></i> ${evt.attendees.length} ${t('rsvp')}
                            </div>
                        </div>
                    `;
                });
            }
            html += `</div></div>`;
            return html;
        },

        createEvent: function() {
            const title = document.getElementById('evt-title').value.trim();
            const dateVal = document.getElementById('evt-date').value;
            const typeVal = document.getElementById('evt-type').value;
            if(title && dateVal) {
                db.events.push({ id: Date.now(), title: title, date: dateVal, type: typeVal, attendees: [] });
                App.renderOwnerDashboard();
            }
        }
    };

    // =========================================
    // MODULE 12: TEAM DIRECTORY
    // =========================================
    const DirectoryModule = {
        id: 'directory', nameKey: 'mod_team', descKey: 'mod_team_desc', icon: 'ph-address-book', hasUserTab: true,

        renderUserView: function() {
            let html = `
                <div class="space-y-6 pb-20">
                    <div>
                        <h2 class="text-2xl font-bold">${t('mod_team')}</h2>
                        <p class="text-gray-500">${t('contact_colleagues')}</p>
                    </div>
                    <div class="space-y-4">
            `;
            
            db.users.forEach(user => {
                const isOnline = isClockedIn(user.id);
                const statusHtml = isOnline 
                    ? `<span class="text-green-500 flex items-center justify-end gap-1"><i class="ph-fill ph-circle text-[8px]"></i> ${t('active')}</span>` 
                    : `<span class="text-gray-400 flex items-center justify-end gap-1"><i class="ph-fill ph-circle text-[8px]"></i> ${t('offline')}</span>`;

                html += `
                    <div class="card-3d p-4 bg-white flex flex-col gap-3">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-full border-2 border-gray-800 ${user.color} flex items-center justify-center text-lg font-bold shadow-[2px_2px_0_0_#1f2937] flex-shrink-0">${user.initials}</div>
                            <div class="flex-1 min-w-0">
                                <div class="font-bold text-lg text-gray-800 leading-tight truncate">${user.name}</div>
                                <div class="text-xs font-bold text-gray-500 uppercase tracking-wider">${t(user.role)}</div>
                            </div>
                            <div class="text-[10px] font-bold text-right">${statusHtml}</div>
                        </div>
                        <div class="flex gap-2 mt-1">
                            <a href="tel:${user.phone}" class="flex-1 btn-sm-3d bg-gray-50 hover:bg-gray-100 text-gray-800 py-2 flex items-center justify-center gap-2 text-sm transition-colors">
                                <i class="ph-fill ph-phone text-lg"></i> ${t('call')}
                            </a>
                            <a href="mailto:${user.email}" class="flex-1 btn-sm-3d bg-gray-50 hover:bg-gray-100 text-gray-800 py-2 flex items-center justify-center gap-2 text-sm transition-colors">
                                <i class="ph-fill ph-envelope-simple text-lg"></i> ${t('email')}
                            </a>
                        </div>
                    </div>
                `;
            });
            html += `</div></div>`;
            return html;
        },

        renderAdminWidget: function() {
            const employees = db.users.filter(u => u.role !== 'owner');
            return `
                <div class="card-3d p-4 bg-gray-50">
                    <div class="flex justify-between items-center border-b-2 border-gray-800 pb-2 mb-3">
                        <h3 class="font-bold flex items-center gap-2"><i class="ph-fill ph-users text-gray-700"></i> ${t('team_management')}</h3>
                        <span class="bg-gray-200 text-gray-800 text-[10px] font-bold px-2 py-0.5 rounded-full border border-gray-300">${db.users.length} ${t('total')}</span>
                    </div>
                    <p class="text-sm text-gray-600 mb-4">${t('you_have')} <strong>${employees.length}</strong> ${t('active_emps')}</p>
                    
                    <a href="mailto:?subject=Join our WorkFlow Team&body=Please download the WorkFlow app to join our company portal." class="btn-sm-3d w-full bg-gray-800 text-white py-2 text-sm flex items-center justify-center gap-2 hover:bg-gray-700 transition-colors">
                        <i class="ph-bold ph-user-plus text-lg"></i> ${t('invite_emp')}
                    </a>
                </div>
            `;
        }
    };

    // =========================================
    // MODULE 13: COMPANY GOALS & TARGETS
    // =========================================
    const GoalsModule = {
        id: 'goals', nameKey: 'mod_goals', descKey: 'mod_goals_desc', icon: 'ph-target', hasUserTab: true,

        formatValue: function(val, unit, prefix) {
            return prefix ? `${unit}${val.toLocaleString()}` : `${val.toLocaleString()}${unit}`;
        },

        renderUserView: function() {
            let html = `
                <div class="space-y-6 pb-20">
                    <div>
                        <h2 class="text-2xl font-bold">${t('mod_goals')}</h2>
                        <p class="text-gray-500">${t('track_progress')}</p>
                    </div>
                    <div class="space-y-5">
            `;

            if(db.goals.length === 0) { html += `<div class="text-center text-gray-400 py-6"><p>${t('no_goals')}</p></div>`; }

            db.goals.forEach(goal => {
                const pct = Math.min(100, Math.round((goal.current / goal.target) * 100));
                const currentFmt = this.formatValue(goal.current, goal.unit, goal.prefix);
                const targetFmt = this.formatValue(goal.target, goal.unit, goal.prefix);
                const titleIcon = pct >= 100 ? '<i class="ph-fill ph-star text-yellow-500 ml-2 animate-pulse"></i>' : '';

                html += `
                    <div class="card-3d p-5 bg-white">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-10 h-10 rounded-full border-2 border-gray-800 ${goal.color} flex items-center justify-center shadow-[2px_2px_0_0_#1f2937]">
                                <i class="ph-bold ph-target text-gray-900 text-xl"></i>
                            </div>
                            <div class="flex-1">
                                <h3 class="font-bold text-lg leading-tight text-gray-800 flex items-center">${goal.title} ${titleIcon}</h3>
                                <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mt-1">${t('goal')}: ${targetFmt}</div>
                            </div>
                        </div>
                        
                        <div class="relative w-full h-8 bg-gray-100 rounded-full border-2 border-gray-800 overflow-hidden shadow-inner flex items-center px-3 z-0">
                            <div class="absolute top-0 left-0 h-full ${goal.color} transition-all duration-1000 -z-10 border-r-2 border-gray-800" style="width: ${pct}%"></div>
                            <div class="flex justify-between w-full text-xs font-bold text-gray-900 z-10 mix-blend-hard-light">
                                <span>${currentFmt}</span>
                                <span>${pct}%</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += `</div></div>`;
            return html;
        },

        renderAdminWidget: function() {
            let html = `
                <div class="card-3d p-4 bg-purple-50">
                    <div class="flex justify-between items-center border-b-2 border-gray-800 pb-2 mb-3">
                        <h3 class="font-bold flex items-center gap-2"><i class="ph-fill ph-target text-purple-600"></i> ${t('active_milestones')}</h3>
                    </div>
                    
                    <div class="mb-4 flex gap-2">
                        <input type="text" id="goal-new-title" placeholder="${t('new_goal_name')}" class="flex-1 border-2 border-gray-800 rounded-lg px-2 py-1 text-sm outline-none focus:bg-white bg-transparent font-bold">
                        <input type="number" id="goal-new-target" placeholder="${t('target')}" class="w-24 border-2 border-gray-800 rounded-lg px-2 py-1 text-sm outline-none focus:bg-white bg-transparent">
                        <button onclick="GoalsModule.createGoal()" class="btn-sm-3d bg-purple-400 text-white px-3 flex items-center justify-center">
                            <i class="ph-bold ph-plus"></i>
                        </button>
                    </div>

                    <div class="space-y-3 border-t-2 border-gray-800 border-dashed pt-3">
            `;

            if(db.goals.length === 0) {
                html += `<p class="text-xs text-gray-500 text-center py-2">${t('no_goals')}</p>`;
            } else {
                db.goals.forEach(goal => {
                    const pct = Math.min(100, Math.round((goal.current / goal.target) * 100));
                    const isDone = pct >= 100;
                    
                    html += `
                        <div class="bg-white border-2 border-gray-800 rounded-xl p-3 shadow-[2px_2px_0_0_#1f2937]">
                            <div class="flex justify-between items-center mb-2">
                                <div class="text-sm font-bold text-gray-800 leading-tight">${goal.title}</div>
                                <span class="text-xs font-bold ${isDone ? 'text-green-500' : 'text-purple-600'}">${pct}%</span>
                            </div>
                            
                            <div class="w-full h-2 bg-gray-200 rounded-full mb-3 overflow-hidden">
                                <div class="h-full ${goal.color}" style="width: ${pct}%"></div>
                            </div>
                            
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] text-gray-500 font-bold">${this.formatValue(goal.current, goal.unit, goal.prefix)} / ${this.formatValue(goal.target, goal.unit, goal.prefix)}</span>
                                <button onclick="GoalsModule.addProgress(${goal.id})" class="btn-sm-3d bg-gray-800 text-white px-2 py-1 text-[10px] font-bold ${isDone ? 'opacity-50 pointer-events-none' : ''}">
                                    ${t('add_progress')}
                                </button>
                            </div>
                        </div>
                    `;
                });
            }
            html += `</div></div>`;
            return html;
        },

        createGoal: function() {
            const title = document.getElementById('goal-new-title').value.trim();
            const targetVal = parseFloat(document.getElementById('goal-new-target').value);
            if(title && !isNaN(targetVal) && targetVal > 0) {
                const colors = ['bg-red-400', 'bg-blue-400', 'bg-emerald-400', 'bg-yellow-400', 'bg-purple-400'];
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                db.goals.push({ id: Date.now(), title: title, current: 0, target: targetVal, unit: '', prefix: false, color: randomColor });
                App.renderOwnerDashboard();
            }
        },

        addProgress: function(id) {
            const goal = db.goals.find(g => g.id === id);
            if(goal && goal.current < goal.target) {
                const increment = Math.max(1, Math.ceil(goal.target * 0.1));
                goal.current = Math.min(goal.target, goal.current + increment);
                App.renderOwnerDashboard();
            }
        }
    };

    // =========================================
    // INITIALIZATION
    // =========================================
    App.registerModule(TimeTrackerModule);
    App.registerModule(TaskManagerModule); 
    App.registerModule(TimeOffModule); 
    App.registerModule(AnnouncementsModule); 
    App.registerModule(ExpensesModule);
    App.registerModule(KudosModule); 
    App.registerModule(MoodTrackerModule); 
    App.registerModule(HelpDeskModule);
    App.registerModule(SuggestionsModule); 
    App.registerModule(PollsModule); 
    App.registerModule(EventsModule); 
    App.registerModule(DirectoryModule); 
    App.registerModule(GoalsModule);
    
    window.onload = () => App.init();

    </script>
</body>
</html>
