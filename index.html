<!DOCTYPE html>
<html>
<head>
    <title>PWA Notification</title>
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <h1>ระบบแจ้งเตือน PWA</h1>
    <button onclick="requestAndShow()">ส่งแจ้งเตือน</button>

    <script>
        // 1. ลงทะเบียน Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        async function requestAndShow() {
            // 2. ขอสิทธิ์แจ้งเตือน
            const permission = await Notification.requestPermission();
            
            if (permission === 'granted') {
                const reg = await navigator.serviceWorker.ready;
                // 3. ส่งข้อมูล url ไปกับแจ้งเตือน
                reg.showNotification('สวัสดีจาก PWA', {
                    body: 'คลิกที่นี่เพื่อไปหน้า page2.html',
                    icon: 'https://via.placeholder.com/128',
                    data: { url: './page2.html' }
                });
            }
        }
    </script>
</body>
</html>
