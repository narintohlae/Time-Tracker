<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบลงเวลาเข้า-ออกงาน (Deep UX)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        /* สกอร์บาร์แบบซ่อนแต่ยังเลื่อนได้ */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col items-center p-4 font-sans text-gray-800">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-sm p-6 mt-2 text-center border border-gray-100">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-xl font-bold">ระบบลงเวลา</h1>
            <button onclick="setAsOffice()" class="text-xs bg-gray-100 text-gray-600 px-3 py-1 rounded-full hover:bg-gray-200 active:scale-95 transition">
                ⚙️ ตั้งค่าที่นี่เป็นออฟฟิศ
            </button>
        </div>
        <p class="text-gray-500 text-sm mt-1" id="currentDate">กำลังโหลดวันที่...</p>
        <div class="text-5xl font-mono font-black text-blue-600 mt-2 tracking-tighter" id="currentTime">00:00:00</div>
    </div>

    <div class="w-full max-w-md mt-6 flex flex-col items-center relative">
        <input type="file" id="cameraInput" accept="image/*" capture="user" class="hidden" onchange="processCheckIn(event)">
        
        <button id="actionBtn" onclick="initiateAction()" 
            class="w-48 h-48 rounded-full text-white text-3xl font-bold shadow-xl transition-all duration-300 transform active:scale-90 flex flex-col items-center justify-center bg-gray-300 cursor-not-allowed border-4 border-white">
            <span id="btnText">รอพิกัด</span>
            <span id="btnSubText" class="text-sm font-normal mt-2 opacity-90">ตรวจสอบ GPS...</span>
        </button>
        
        <div class="w-full mt-6">
            <input type="text" id="noteInput" placeholder="📝 พิมพ์หมายเหตุก่อนลงเวลา (ถ้ามี)..." 
                class="w-full p-4 rounded-2xl border border-gray-200 bg-white text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all shadow-sm">
        </div>

        <div class="mt-4 w-full bg-white rounded-xl p-3 shadow-sm border border-gray-100 flex items-center justify-between">
            <div class="flex items-center">
                <span id="gpsIcon" class="text-xl mr-2">📍</span>
                <div class="flex flex-col text-left">
                    <span class="text-xs text-gray-400 font-bold">สถานะตำแหน่ง</span>
                    <span id="locationStatus" class="text-sm text-gray-600 font-medium">กำลังคำนวณ...</span>
                </div>
            </div>
            <span id="distanceBadge" class="text-xs bg-gray-100 px-2 py-1 rounded-md font-mono">-</span>
        </div>
    </div>

    <div class="w-full max-w-md mt-6 bg-white rounded-3xl shadow-sm p-6 flex-grow mb-4 overflow-hidden flex flex-col border border-gray-100">
        <h2 class="text-lg font-bold mb-4 pb-2 border-b border-gray-100 flex justify-between items-end">
            ประวัติการลงเวลา
            <span class="text-xs text-gray-400 font-normal">บันทึกในเครื่อง</span>
        </h2>
        <div id="logHistory" class="overflow-y-auto flex-grow space-y-4 hide-scrollbar">
            </div>
    </div>

    <script>
        let isCheckedIn = false;
        let isLocationValid = false;
        let logs = JSON.parse(localStorage.getItem('timeLogs')) || [];
        
        // ดึงพิกัดออฟฟิศจากเครื่อง (ถ้าไม่มีให้ว่างไว้ เพื่อบังคับให้ผู้ใช้กดตั้งค่าก่อน)
        let officeCoords = JSON.parse(localStorage.getItem('officeConfig'));
        const ALLOWED_RADIUS_METERS = 100; 

        // อัปเดตนาฬิกา
        function updateClock() {
            const now = new Date();
            document.getElementById('currentTime').innerText = now.toLocaleTimeString('th-TH', { hour12: false });
            document.getElementById('currentDate').innerText = now.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function initApp() {
            if (logs.length > 0 && logs[0].type === 'เข้างาน') isCheckedIn = true;
            
            if (!officeCoords) {
                document.getElementById('locationStatus').innerText = "ยังไม่ได้ตั้งค่าจุดออฟฟิศ";
                document.getElementById('locationStatus').classList.add('text-red-500');
            } else {
                trackLocation();
            }
            renderLogs();
            updateButtonUI();
        }

        // ฟังก์ชันสำหรับ "ตั้งค่าที่นี่เป็นออฟฟิศ"
        function setAsOffice() {
            if (!confirm("ต้องการตั้งค่าพิกัดปัจจุบันของคุณ เป็นจุดออฟฟิศสำหรับการลงเวลาใช่หรือไม่?")) return;
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    officeCoords = { lat: position.coords.latitude, lng: position.coords.longitude };
                    localStorage.setItem('officeConfig', JSON.stringify(officeCoords));
                    alert("บันทึกพิกัดออฟฟิศสำเร็จ! ลองเดินออกไป 100 เมตรเพื่อทดสอบระบบล็อกได้เลยครับ");
                    trackLocation(); // เริ่มจับพิกัดใหม่
                },
                (error) => { alert("ไม่สามารถดึงพิกัดได้ กรุณาเปิด GPS และอนุญาตให้เว็บเข้าถึงตำแหน่ง"); },
                { enableHighAccuracy: true }
            );
        }

        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
            var R = 6371; 
            var dLat = (lat2 - lat1) * Math.PI / 180;
            var dLon = (lon2 - lon1) * Math.PI / 180;
            var a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        }

        function trackLocation() {
            if (!officeCoords) return;

            navigator.geolocation.watchPosition(
                (position) => {
                    const distanceKm = getDistanceFromLatLonInKm(officeCoords.lat, officeCoords.lng, position.coords.latitude, position.coords.longitude);
                    const distanceMeters = Math.floor(distanceKm * 1000);
                    const statusText = document.getElementById('locationStatus');
                    const badge = document.getElementById('distanceBadge');

                    badge.innerText = `${distanceMeters} ม.`;

                    if (distanceMeters <= ALLOWED_RADIUS_METERS) {
                        isLocationValid = true;
                        statusText.innerText = `อยู่ในพื้นที่พร้อมลงเวลา`;
                        statusText.className = "text-sm text-green-600 font-bold";
                        badge.className = "text-xs bg-green-100 text-green-700 px-2 py-1 rounded-md font-mono font-bold";
                    } else {
                        isLocationValid = false;
                        statusText.innerText = `อยู่นอกพื้นที่ทำงาน`;
                        statusText.className = "text-sm text-red-500 font-bold";
                        badge.className = "text-xs bg-red-100 text-red-700 px-2 py-1 rounded-md font-mono font-bold";
                    }
                    updateButtonUI();
                },
                (error) => { document.getElementById('locationStatus').innerText = "กรุณาเปิด GPS"; },
                { enableHighAccuracy: true }
            );
        }

        function initiateAction() {
            if (!officeCoords) { alert("กรุณากด 'ตั้งค่าที่นี่เป็นออฟฟิศ' ก่อนเริ่มใช้งานครับ"); return; }
            if (!isLocationValid) { alert("ระบบล็อก! คุณอยู่นอกพื้นที่ที่กำหนด"); return; }
            if (isCheckedIn && !confirm("ยืนยันการลงเวลา 'ออกงาน' ?")) return;
            
            document.getElementById('cameraInput').click();
        }

        function processCheckIn(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                // ส่งรูปไปบีบอัดก่อนเซฟ
                compressImage(e.target.result, 400, 400, function(compressedBase64) {
                    saveLog(compressedBase64);
                });
            };
            reader.readAsDataURL(file);
        }

        // ระบบบีบอัดรูปอัจฉริยะ (Resize & Compress)
        function compressImage(base64Str, maxWidth, maxHeight, callback) {
            let img = new Image();
            img.src = base64Str;
            img.onload = function() {
                let canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;

                if (width > height) { if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; } } 
                else { if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; } }

                canvas.width = width;
                canvas.height = height;
                let ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                // ลดคุณภาพเหลือ 70% (0.7) เพื่อประหยัดพื้นที่
                callback(canvas.toDataURL('image/jpeg', 0.7)); 
            };
        }

        function saveLog(photoBase64) {
            const noteInput = document.getElementById('noteInput');
            const now = new Date();
            const newLog = {
                id: now.getTime(),
                date: now.toLocaleDateString('th-TH'),
                time: now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
                type: isCheckedIn ? 'ออกงาน' : 'เข้างาน',
                note: noteInput.value.trim() || "",
                photo: photoBase64
            };

            logs.unshift(newLog);
            // เก็บประวัติแค่ 50 รายการล่าสุด เพื่อไม่ให้เครื่องหนักเกินไป
            if (logs.length > 50) logs.pop(); 
            localStorage.setItem('timeLogs', JSON.stringify(logs));

            isCheckedIn = !isCheckedIn;
            noteInput.value = ''; 
            document.getElementById('cameraInput').value = ''; 
            updateButtonUI();
            renderLogs();
        }

        function updateButtonUI() {
            const btn = document.getElementById('actionBtn');
            const btnText = document.getElementById('btnText');
            const btnSubText = document.getElementById('btnSubText');
            
            btn.className = "w-48 h-48 rounded-full text-white text-3xl font-bold shadow-xl transition-all duration-300 transform active:scale-90 flex flex-col items-center justify-center border-4 border-white";

            if (!officeCoords) {
                btn.classList.add('bg-gray-300', 'cursor-not-allowed');
                btnText.innerText = 'รอตั้งค่า';
                btnSubText.innerText = 'ตั้งค่าออฟฟิศก่อน';
            } else if (!isLocationValid) {
                btn.classList.add('bg-gray-400', 'cursor-not-allowed', 'opacity-80');
                btnText.innerText = 'ล็อก';
                btnSubText.innerText = 'อยู่นอกพื้นที่';
            } else if (isCheckedIn) {
                btn.classList.add('bg-red-500', 'hover:bg-red-600', 'shadow-red-500/50');
                btnText.innerText = 'ออกงาน';
                btnSubText.innerText = 'กดเพื่อถ่ายรูปเซลฟี่';
            } else {
                btn.classList.add('bg-green-500', 'hover:bg-green-600', 'shadow-green-500/50');
                btnText.innerText = 'เข้างาน';
                btnSubText.innerText = 'กดเพื่อถ่ายรูปเซลฟี่';
            }
        }

        // ระบบจัดกลุ่มประวัติรายวัน
        function renderLogs() {
            const logContainer = document.getElementById('logHistory');
            logContainer.innerHTML = '';
            
            if (logs.length === 0) {
                logContainer.innerHTML = '<div class="text-center text-gray-400 py-10">ยังไม่มีประวัติการลงเวลา</div>';
                return;
            }

            // จัดกลุ่มข้อมูลตามวันที่
            const groupedLogs = logs.reduce((acc, log) => {
                if (!acc[log.date]) acc[log.date] = [];
                acc[log.date].push(log);
                return acc;
            }, {});

            for (const [date, dayLogs] of Object.entries(groupedLogs)) {
                let dayHtml = `<div class="mb-4">
                    <h3 class="text-sm font-bold text-gray-800 bg-gray-100 py-1 px-3 rounded-md mb-2 inline-block">${date}</h3>
                    <div class="space-y-2">`;
                
                dayLogs.forEach(log => {
                    const isCheckIn = log.type === 'เข้างาน';
                    const dotColor = isCheckIn ? 'bg-green-500' : 'bg-red-500';
                    const noteHtml = log.note ? `<p class="text-xs text-gray-500 mt-1">📝 ${log.note}</p>` : '';

                    dayHtml += `
                        <div class="flex items-start p-3 bg-white rounded-xl border border-gray-100 shadow-sm">
                            <img src="${log.photo}" class="w-12 h-12 rounded-xl object-cover mr-3 border border-gray-100">
                            <div class="flex flex-col flex-grow">
                                <div class="flex justify-between items-center w-full">
                                    <div class="flex items-center">
                                        <div class="w-2 h-2 rounded-full ${dotColor} mr-2"></div>
                                        <span class="font-bold text-sm text-gray-800">${log.type}</span>
                                    </div>
                                    <span class="font-mono font-bold text-gray-900">${log.time}</span>
                                </div>
                                ${noteHtml}
                            </div>
                        </div>`;
                });
                dayHtml += `</div></div>`;
                logContainer.innerHTML += dayHtml;
            }
        }

        initApp();
    </script>
</body>
</html>
