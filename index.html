<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA แจ้งเตือน</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f0f0f0; }
        button { padding: 15px 30px; font-size: 18px; margin: 10px; border-radius: 8px; border: none; cursor: pointer; }
        #btn-permission { background-color: #007aff; color: white; }
        #btn-notify { background-color: #34c759; color: white; display: none; }
    </style>
</head>
<body>

    <h1>ทดสอบการแจ้งเตือน 🔔</h1>
    <p id="status">สถานะ: รอการอนุญาต</p>

    <button id="btn-permission">1. ขออนุญาตส่งแจ้งเตือน</button>
    <button id="btn-notify">2. ทดสอบส่งแจ้งเตือนเลย!</button>

    <script>
        // ติดตั้ง Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log('Service Worker ติดตั้งสำเร็จ!'))
            .catch(err => console.error('ติดตั้ง Service Worker พลาด:', err));
        }

        const btnPermission = document.getElementById('btn-permission');
        const btnNotify = document.getElementById('btn-notify');
        const statusText = document.getElementById('status');

        // ฟังก์ชันขออนุญาตเมื่อกดปุ่ม
        btnPermission.addEventListener('click', async () => {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                statusText.innerText = "สถานะ: อนุญาตแล้ว ✅";
                btnPermission.style.display = 'none';
                btnNotify.style.display = 'inline-block';
            } else {
                statusText.innerText = "สถานะ: ปฏิเสธ ❌";
            }
        });

        // ฟังก์ชันสั่งให้ Service Worker ส่งแจ้งเตือน
        btnNotify.addEventListener('click', () => {
            navigator.serviceWorker.ready.then(registration => {
                registration.showNotification('สวัสดีจาก PWA! 🚀', {
                    body: 'ระบบแจ้งเตือนของคุณทำงานได้อย่างสมบูรณ์แบบ',
                    vibrate: [200, 100, 200]
                });
            });
        });
    </script>
</body>
</html>
