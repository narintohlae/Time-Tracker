<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบลงเวลาพนักงาน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f0f4f8;
            color: #1f2937;
            -webkit-tap-highlight-color: transparent;
        }

        /* Isometric / Neo-Brutalism Styles */
        .iso-card {
            background: #ffffff;
            border: 3px solid #111827;
            box-shadow: 6px 6px 0px #111827;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .iso-btn {
            border: 3px solid #111827;
            box-shadow: 4px 4px 0px #111827;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.1s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .iso-btn:active:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #111827;
        }

        .iso-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #111827;
        }

        .iso-btn-primary { background-color: #3b82f6; color: white; }
        .iso-btn-success { background-color: #10b981; color: white; }
        .iso-btn-danger { background-color: #ef4444; color: white; }
        .iso-btn-warning { background-color: #f59e0b; color: white; }
        .iso-btn-white { background-color: #ffffff; color: #111827; }

        .iso-input {
            border: 3px solid #111827;
            border-radius: 8px;
            padding: 0.75rem;
            width: 100%;
            outline: none;
            transition: all 0.2s;
            box-shadow: inset 2px 2px 0px rgba(0,0,0,0.05);
        }
        .iso-input:focus {
            box-shadow: 4px 4px 0px #3b82f6;
            border-color: #3b82f6;
        }

        /* Toggle Switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #10b981;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #10b981;
        }
        
        /* Modal Overlay */
        .modal-overlay {
            background-color: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(4px);
        }

        /* Camera Box */
        #video-container {
            position: relative;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            border: 3px solid #111827;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }
        #camera-video {
            width: 100%;
            height: auto;
            display: block;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- App Container -->
    <div id="app" class="flex-grow flex flex-col w-full max-w-md mx-auto relative p-4 pb-20">
        <!-- Content will be injected here by JS -->
        <div class="flex items-center justify-center h-full mt-20">
            <div class="flex flex-col items-center">
                <div class="loader mb-4"></div>
                <p class="font-medium">กำลังเชื่อมต่อระบบ...</p>
            </div>
        </div>
    </div>

    <!-- Custom Modal -->
    <div id="custom-modal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-200 p-4">
        <div class="iso-card w-full max-w-sm p-6 transform scale-95 transition-transform duration-200" id="modal-content-box">
            <h3 id="modal-title" class="text-xl font-bold mb-2">แจ้งเตือน</h3>
            <p id="modal-message" class="text-gray-600 mb-6 whitespace-pre-wrap"></p>
            <div id="modal-buttons" class="flex justify-end gap-3">
                <!-- Buttons injected dynamically -->
            </div>
        </div>
    </div>

    <!-- Camera Modal -->
    <div id="camera-modal" class="fixed inset-0 modal-overlay z-50 flex flex-col items-center justify-center hidden opacity-0 transition-opacity duration-200 p-4">
        <div class="iso-card w-full max-w-sm p-4 text-center">
            <h3 class="text-xl font-bold mb-4"><i class="fas fa-camera mr-2"></i>ถ่ายรูปยืนยันตัวตน</h3>
            <div id="video-container" class="mb-4">
                <video id="camera-video" autoplay playsinline></video>
                <canvas id="camera-canvas" class="hidden"></canvas>
            </div>
            <p id="camera-status" class="text-sm text-gray-500 mb-4">กรุณามองกล้องและจัดใบหน้าให้อยู่ในกรอบ</p>
            <div class="flex gap-3 justify-center">
                <button id="btn-cancel-camera" class="iso-btn iso-btn-danger py-2 px-4 flex-1">ยกเลิก</button>
                <button id="btn-take-photo" class="iso-btn iso-btn-primary py-2 px-4 flex-1"><i class="fas fa-circle"></i> ถ่ายรูป</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase Configuration (อัปเดตเป็นของคุณแล้ว) ---
        const firebaseConfig = {
            apiKey: "AIzaSyBHuZGyY1F3v4rCrhrpt9YB90C0Ahh-stE",
            authDomain: "my-company-time-tracking.firebaseapp.com",
            projectId: "my-company-time-tracking",
            storageBucket: "my-company-time-tracking.firebasestorage.app",
            messagingSenderId: "758524847747",
            appId: "1:758524847747:web:2e5a49e4064334f1265db6",
            measurementId: "G-50SYJKTRT1"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // ใช้ชื่อโปรเจกต์ของคุณเป็น appId เพื่อจัดกลุ่มข้อมูลในฐานข้อมูลให้เป็นระเบียบ
        const appId = 'my-company-time-tracking';

        // State Management
        let currentUser = null;
        let currentView = 'role-select'; // role-select, emp-login, owner-login, emp-dash, owner-dash
        let activeEmployee = null; // ข้อมูลพนักงานที่กำลังล็อกอิน
        
        // Data Collections
        let employees = [];
        let timelogs = [];
        let appSettings = {
            ownerPin: '9999', // รหัสผ่านตั้งต้น
            requireGPS: true,
            requireSelfie: true
        };

        // DOM Elements
        const appDiv = document.getElementById('app');
        
        // --- Modal System ---
        function showModal(title, message, buttons = [{ text: 'ตกลง', type: 'primary', action: closeModal }]) {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            
            const btnContainer = document.getElementById('modal-buttons');
            btnContainer.innerHTML = '';
            
            buttons.forEach(btn => {
                const buttonEl = document.createElement('button');
                buttonEl.className = `iso-btn iso-btn-${btn.type} py-2 px-4`;
                buttonEl.innerText = btn.text;
                buttonEl.onclick = () => {
                    if (btn.action) btn.action();
                };
                btnContainer.appendChild(buttonEl);
            });

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                document.getElementById('modal-content-box').classList.remove('scale-95');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('custom-modal');
            modal.classList.add('opacity-0');
            document.getElementById('modal-content-box').classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }

        // --- Firebase Data Fetching ---
        function setupRealtimeListeners() {
            if (!currentUser) return;

            const baseCollectionPath = `artifacts/${appId}/public/data`;

            // Listen to Settings
            const settingsRef = doc(db, baseCollectionPath, 'config', 'appSettings');
            onSnapshot(settingsRef, (docSnap) => {
                if (docSnap.exists()) {
                    appSettings = docSnap.data();
                } else {
                    // Initialize default settings
                    setDoc(settingsRef, appSettings);
                }
                render();
            }, (error) => console.error("Error fetching settings:", error));

            // Listen to Employees
            const empRef = collection(db, baseCollectionPath, 'employees');
            onSnapshot(empRef, (snapshot) => {
                employees = [];
                snapshot.forEach(doc => {
                    employees.push({ id: doc.id, ...doc.data() });
                });
                render();
            }, (error) => console.error("Error fetching employees:", error));

            // Listen to Timelogs
            const logsRef = collection(db, baseCollectionPath, 'timelogs');
            onSnapshot(logsRef, (snapshot) => {
                timelogs = [];
                snapshot.forEach(doc => {
                    timelogs.push({ id: doc.id, ...doc.data() });
                });
                // Sort in memory (Rule 2: No complex queries)
                timelogs.sort((a, b) => b.timestamp - a.timestamp);
                render();
            }, (error) => console.error("Error fetching logs:", error));
        }

        // --- Authentication Init ---
        const initAuth = async () => {
            try {
                // สำหรับการใช้งานทั่วไปและใช้งานบนโฮสติ้งของคุณ
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Error: ", err);
                showModal('ข้อผิดพลาดการเชื่อมต่อ', 'กรุณาตรวจสอบว่าเปิดใช้งาน Anonymous Authentication ใน Firebase หรือยัง');
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                setupRealtimeListeners();
            } else {
                appDiv.innerHTML = `<div class="p-4 text-center text-red-500 font-bold">กรุณาเข้าสู่ระบบ</div>`;
            }
        });

        // Initialize App
        initAuth();

        // --- Utility Functions ---
        function formatDate(timestamp) {
            if (!timestamp) return '-';
            const d = new Date(timestamp);
            return d.toLocaleDateString('th-TH', { day: '2-digit', month: 'short', year: 'numeric' }) + ' ' + 
                   d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
        }

        // --- Camera & GPS Actions ---
        let videoStream = null;
        
        async function captureSelfie() {
            return new Promise((resolve, reject) => {
                const modal = document.getElementById('camera-modal');
                const video = document.getElementById('camera-video');
                const canvas = document.getElementById('camera-canvas');
                const btnCancel = document.getElementById('btn-cancel-camera');
                const btnTake = document.getElementById('btn-take-photo');
                const statusTxt = document.getElementById('camera-status');

                modal.classList.remove('hidden');
                setTimeout(() => modal.classList.remove('opacity-0'), 10);
                statusTxt.innerText = "กำลังเปิดกล้อง...";
                btnTake.disabled = true;

                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
                    .then(stream => {
                        videoStream = stream;
                        video.srcObject = stream;
                        video.play();
                        statusTxt.innerText = "กรุณามองกล้องและจัดใบหน้าให้อยู่ในกรอบ";
                        btnTake.disabled = false;
                    })
                    .catch(err => {
                        closeCamera();
                        reject(new Error("ไม่สามารถเข้าถึงกล้องได้ กรุณาอนุญาตการใช้งานกล้อง"));
                    });

                btnTake.onclick = () => {
                    const context = canvas.getContext('2d');
                    // Resize to save space
                    canvas.width = 300;
                    canvas.height = (video.videoHeight / video.videoWidth) * 300;
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    const photoData = canvas.toDataURL('image/jpeg', 0.6); // Compress quality
                    closeCamera();
                    resolve(photoData);
                };

                btnCancel.onclick = () => {
                    closeCamera();
                    reject(new Error("ยกเลิกการถ่ายรูป"));
                };
            });
        }

        function closeCamera() {
            const modal = document.getElementById('camera-modal');
            modal.classList.add('opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 200);
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
        }

        async function getLocation() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject(new Error("อุปกรณ์ของคุณไม่รองรับ GPS"));
                }
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        resolve({
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        });
                    },
                    (error) => {
                        reject(new Error("ไม่สามารถระบุตำแหน่งได้ กรุณาอนุญาตการเข้าถึง GPS"));
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            });
        }

        // --- Core Application Logic ---

        async function processTimeLog(type) {
            if (!activeEmployee) return;

            let photoData = null;
            let locationData = null;

            try {
                // 1. Check Camera
                if (appSettings.requireSelfie) {
                    photoData = await captureSelfie();
                }

                // 2. Check GPS
                if (appSettings.requireGPS) {
                    showModal('กำลังดำเนินการ', 'กำลังตรวจสอบตำแหน่ง GPS...', []);
                    locationData = await getLocation();
                    closeModal();
                }

                // 3. Save to Firestore
                showModal('กำลังบันทึก', 'กำลังบันทึกข้อมูลเข้าระบบ...', []);
                
                const baseCollectionPath = `artifacts/${appId}/public/data`;
                await addDoc(collection(db, baseCollectionPath, 'timelogs'), {
                    empId: activeEmployee.id,
                    empName: activeEmployee.name,
                    type: type, // 'IN' or 'OUT'
                    timestamp: Date.now(),
                    photoData: photoData,
                    location: locationData
                });

                closeModal();
                showModal('สำเร็จ!', `บันทึกเวลา${type === 'IN' ? 'เข้า' : 'ออก'}งานเรียบร้อยแล้ว`, [
                    { text: 'ตกลง', type: 'success', action: () => {
                        closeModal();
                        activeEmployee = null; // Logout employee after action
                        currentView = 'role-select';
                        render();
                    }}
                ]);

            } catch (error) {
                closeModal();
                showModal('ข้อผิดพลาด', error.message);
            }
        }

        // --- Render Views ---

        window.changeView = (view) => {
            currentView = view;
            if(view === 'role-select') activeEmployee = null;
            render();
        }

        function render() {
            if (!currentUser) return; // Wait for auth

            let html = '';

            switch (currentView) {
                case 'role-select':
                    html = renderRoleSelect();
                    break;
                case 'emp-login':
                    html = renderEmpLogin();
                    break;
                case 'emp-dash':
                    html = renderEmpDash();
                    break;
                case 'owner-login':
                    html = renderOwnerLogin();
                    break;
                case 'owner-dash':
                    html = renderOwnerDash();
                    break;
            }

            appDiv.innerHTML = html;
            attachEventListeners();
        }

        function renderRoleSelect() {
            return `
                <div class="flex flex-col items-center justify-center h-full gap-6 mt-10">
                    <div class="text-center mb-6">
                        <div class="w-24 h-24 bg-blue-500 rounded-3xl mx-auto mb-4 border-4 border-gray-900 box-shadow: 6px 6px 0px #111827 flex items-center justify-center text-white text-4xl" style="box-shadow: 6px 6px 0px #111827; transform: rotate(-5deg);">
                            <i class="fas fa-clock"></i>
                        </div>
                        <h1 class="text-3xl font-black text-gray-900 drop-shadow-md">TimeCheck</h1>
                        <p class="text-gray-600 mt-2 font-medium">เลือกระบบที่ต้องการใช้งาน</p>
                    </div>

                    <button data-action="go-emp-login" class="iso-btn iso-btn-primary w-full py-5 text-xl">
                        <i class="fas fa-user-clock text-2xl"></i> พนักงานลงเวลา
                    </button>
                    
                    <button data-action="go-owner-login" class="iso-btn iso-btn-white w-full py-4 text-lg mt-4">
                        <i class="fas fa-store"></i> สำหรับเจ้าของร้าน
                    </button>
                </div>
            `;
        }

        function renderEmpLogin() {
            return `
                <div class="mt-4">
                    <button data-action="go-home" class="mb-4 text-gray-600 font-medium"><i class="fas fa-arrow-left"></i> กลับ</button>
                    <div class="iso-card p-6">
                        <h2 class="text-2xl font-bold mb-6 text-center border-b-2 border-gray-200 pb-4">เข้าสู่ระบบพนักงาน</h2>
                        
                        <div class="mb-4">
                            <label class="block text-gray-700 font-bold mb-2">เลือกชื่อพนักงาน</label>
                            <select id="emp-select" class="iso-input bg-white cursor-pointer">
                                <option value="">-- กรุณาเลือกชื่อ --</option>
                                ${employees.map(emp => `<option value="${emp.id}">${emp.name}</option>`).join('')}
                            </select>
                        </div>

                        <div class="mb-6">
                            <label class="block text-gray-700 font-bold mb-2">รหัส PIN 4 หลัก</label>
                            <input type="password" id="emp-pin" class="iso-input text-center text-2xl tracking-widest" placeholder="****" maxlength="4" pattern="[0-9]*" inputmode="numeric">
                        </div>

                        <button id="btn-emp-login" class="iso-btn iso-btn-primary w-full py-3 text-lg">เข้าสู่ระบบ</button>
                    </div>
                </div>
            `;
        }

        function renderEmpDash() {
            if (!activeEmployee) return renderRoleSelect();
            return `
                <div class="mt-4 flex flex-col h-full">
                    <div class="flex justify-between items-center mb-6">
                        <div>
                            <p class="text-sm text-gray-500 font-bold">ยินดีต้อนรับ</p>
                            <h2 class="text-2xl font-black text-blue-600">${activeEmployee.name}</h2>
                        </div>
                        <button data-action="logout" class="iso-btn iso-btn-white px-3 py-1 text-sm"><i class="fas fa-sign-out-alt"></i> ออก</button>
                    </div>

                    <div class="iso-card p-6 text-center flex-grow flex flex-col justify-center gap-6 mb-6 bg-blue-50">
                        <div class="text-5xl font-black text-gray-800 mb-4" id="live-clock">
                            --:--
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <button id="btn-clock-in" class="iso-btn iso-btn-success py-8 text-xl flex flex-col items-center gap-2">
                                <i class="fas fa-sign-in-alt text-3xl"></i>
                                เข้างาน
                            </button>
                            <button id="btn-clock-out" class="iso-btn iso-btn-danger py-8 text-xl flex flex-col items-center gap-2">
                                <i class="fas fa-sign-out-alt text-3xl"></i>
                                ออกงาน
                            </button>
                        </div>
                        
                        <div class="flex justify-center gap-4 mt-4 text-sm text-gray-600 font-medium">
                            <span class="${appSettings.requireGPS ? 'text-green-600' : 'text-gray-400'}">
                                <i class="fas fa-map-marker-alt"></i> GPS: ${appSettings.requireGPS ? 'เปิด' : 'ปิด'}
                            </span>
                            <span class="${appSettings.requireSelfie ? 'text-green-600' : 'text-gray-400'}">
                                <i class="fas fa-camera"></i> รูป: ${appSettings.requireSelfie ? 'เปิด' : 'ปิด'}
                            </span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderOwnerLogin() {
            return `
                <div class="mt-10">
                    <button data-action="go-home" class="mb-4 text-gray-600 font-medium"><i class="fas fa-arrow-left"></i> กลับ</button>
                    <div class="iso-card p-6 bg-gray-800 text-white border-gray-900 box-shadow: 6px 6px 0px #000;">
                        <div class="text-center mb-6">
                            <i class="fas fa-lock text-4xl mb-2 text-yellow-400"></i>
                            <h2 class="text-2xl font-bold">ระบบจัดการ (Owner)</h2>
                        </div>
                        
                        <div class="mb-6">
                            <label class="block text-gray-300 font-bold mb-2">รหัสผ่านเจ้าของร้าน</label>
                            <input type="password" id="owner-pin" class="iso-input text-center text-2xl tracking-widest text-black" placeholder="****" inputmode="numeric">
                            <p class="text-xs text-gray-400 mt-2 text-center">รหัสเริ่มต้นคือ 9999</p>
                        </div>

                        <button id="btn-owner-login" class="iso-btn iso-btn-warning w-full py-3 text-lg text-gray-900">ปลดล็อก</button>
                    </div>
                </div>
            `;
        }

        // Global state for owner dashboard tab
        let ownerTab = 'logs'; // logs, emps, settings

        window.setOwnerTab = (tab) => {
            ownerTab = tab;
            render();
        };

        function renderOwnerDash() {
            let tabContent = '';
            
            if (ownerTab === 'logs') {
                tabContent = `
                    <div class="space-y-4">
                        <h3 class="font-bold text-lg border-b-2 pb-2">ประวัติลงเวลาล่าสุด</h3>
                        ${timelogs.length === 0 ? '<p class="text-center text-gray-500 py-4">ยังไม่มีข้อมูล</p>' : ''}
                        ${timelogs.map(log => `
                            <div class="iso-card p-4 flex gap-4 items-center">
                                ${log.photoData ? `<img src="${log.photoData}" class="w-16 h-16 rounded-lg object-cover border-2 border-gray-800">` : `<div class="w-16 h-16 bg-gray-200 rounded-lg flex items-center justify-center border-2 border-gray-800"><i class="fas fa-user text-gray-400"></i></div>`}
                                <div class="flex-grow">
                                    <div class="flex justify-between items-start">
                                        <h4 class="font-bold text-lg">${log.empName}</h4>
                                        <span class="px-2 py-1 text-xs font-bold rounded ${log.type === 'IN' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'} border border-current">
                                            ${log.type === 'IN' ? 'เข้างาน' : 'ออกงาน'}
                                        </span>
                                    </div>
                                    <p class="text-sm text-gray-600 mt-1"><i class="far fa-clock"></i> ${formatDate(log.timestamp)}</p>
                                    ${log.location ? `<p class="text-xs text-blue-500 mt-1"><a href="https://maps.google.com/?q=${log.location.lat},${log.location.lng}" target="_blank"><i class="fas fa-map-marker-alt"></i> ดูแผนที่</a></p>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (ownerTab === 'emps') {
                tabContent = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center border-b-2 pb-2">
                            <h3 class="font-bold text-lg">พนักงานทั้งหมด</h3>
                            <button id="btn-add-emp" class="iso-btn iso-btn-primary px-3 py-1 text-sm"><i class="fas fa-plus"></i> เพิ่ม</button>
                        </div>
                        
                        <div id="add-emp-form" class="iso-card p-4 hidden bg-blue-50 border-blue-800">
                            <h4 class="font-bold mb-3 text-blue-800">เพิ่มพนักงานใหม่</h4>
                            <input type="text" id="new-emp-name" placeholder="ชื่อ-นามสกุล" class="iso-input mb-3">
                            <input type="text" id="new-emp-pin" placeholder="ตั้งรหัส PIN 4 หลัก" class="iso-input mb-3" maxlength="4" pattern="[0-9]*" inputmode="numeric">
                            <div class="flex gap-2">
                                <button id="save-new-emp" class="iso-btn iso-btn-success flex-1 py-2">บันทึก</button>
                                <button onclick="document.getElementById('add-emp-form').classList.add('hidden')" class="iso-btn iso-btn-white flex-1 py-2">ยกเลิก</button>
                            </div>
                        </div>

                        ${employees.length === 0 ? '<p class="text-center text-gray-500 py-4">ยังไม่มีพนักงาน</p>' : ''}
                        ${employees.map(emp => `
                            <div class="iso-card p-3 flex justify-between items-center">
                                <div>
                                    <h4 class="font-bold">${emp.name}</h4>
                                    <p class="text-sm text-gray-500">PIN: ${emp.pin}</p>
                                </div>
                                <button data-delete-emp="${emp.id}" class="iso-btn iso-btn-danger px-3 py-1 text-sm"><i class="fas fa-trash"></i></button>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (ownerTab === 'settings') {
                tabContent = `
                    <div class="space-y-6">
                        <h3 class="font-bold text-lg border-b-2 pb-2">ตั้งค่าระบบ</h3>
                        
                        <div class="iso-card p-4">
                            <h4 class="font-bold mb-4 border-b pb-2">ฟังก์ชันลงเวลา</h4>
                            
                            <div class="flex items-center justify-between mb-4">
                                <div>
                                    <div class="font-bold">ถ่ายรูปเซลฟี่ (Selfie)</div>
                                    <div class="text-xs text-gray-500">บังคับถ่ายรูปตอนเข้า-ออกงาน</div>
                                </div>
                                <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                                    <input type="checkbox" id="toggle-selfie" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer border-gray-300 z-10 top-0 left-0" ${appSettings.requireSelfie ? 'checked' : ''}/>
                                    <label for="toggle-selfie" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer"></label>
                                </div>
                            </div>

                            <div class="flex items-center justify-between">
                                <div>
                                    <div class="font-bold">พิกัด GPS</div>
                                    <div class="text-xs text-gray-500">บันทึกพิกัดสถานที่ลงเวลา</div>
                                </div>
                                <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                                    <input type="checkbox" id="toggle-gps" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer border-gray-300 z-10 top-0 left-0" ${appSettings.requireGPS ? 'checked' : ''}/>
                                    <label for="toggle-gps" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer"></label>
                                </div>
                            </div>
                        </div>

                        <div class="iso-card p-4 bg-red-50 border-red-800">
                            <h4 class="font-bold mb-4 border-b border-red-200 pb-2 text-red-800">เปลี่ยนรหัส Owner</h4>
                            <input type="text" id="new-owner-pin" placeholder="รหัสผ่านใหม่" class="iso-input mb-3" inputmode="numeric">
                            <button id="btn-save-owner-pin" class="iso-btn iso-btn-danger w-full py-2">บันทึกรหัสใหม่</button>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="flex flex-col h-full mt-2">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-black text-gray-800"><i class="fas fa-cog"></i> ส่วนจัดการร้าน</h2>
                        <button data-action="go-home" class="iso-btn iso-btn-white px-3 py-1 text-sm"><i class="fas fa-sign-out-alt"></i> ออก</button>
                    </div>

                    <div class="flex gap-2 mb-4 bg-gray-200 p-1 rounded-lg border-2 border-gray-900 box-shadow: 2px 2px 0px #000;">
                        <button onclick="setOwnerTab('logs')" class="flex-1 py-2 font-bold text-sm rounded-md transition-colors ${ownerTab === 'logs' ? 'bg-white shadow-sm border border-gray-300' : 'text-gray-500'}">ประวัติ</button>
                        <button onclick="setOwnerTab('emps')" class="flex-1 py-2 font-bold text-sm rounded-md transition-colors ${ownerTab === 'emps' ? 'bg-white shadow-sm border border-gray-300' : 'text-gray-500'}">พนักงาน</button>
                        <button onclick="setOwnerTab('settings')" class="flex-1 py-2 font-bold text-sm rounded-md transition-colors ${ownerTab === 'settings' ? 'bg-white shadow-sm border border-gray-300' : 'text-gray-500'}">ตั้งค่า</button>
                    </div>

                    <div class="flex-grow overflow-y-auto pb-6">
                        ${tabContent}
                    </div>
                </div>
            `;
        }

        // --- Event Listeners Attachment ---
        function attachEventListeners() {
            // Navigation
            document.querySelectorAll('[data-action="go-home"]').forEach(el => {
                el.onclick = () => changeView('role-select');
            });
            document.querySelectorAll('[data-action="go-emp-login"]').forEach(el => {
                el.onclick = () => changeView('emp-login');
            });
            document.querySelectorAll('[data-action="go-owner-login"]').forEach(el => {
                el.onclick = () => changeView('owner-login');
            });
            document.querySelectorAll('[data-action="logout"]').forEach(el => {
                el.onclick = () => changeView('role-select');
            });

            // Emp Login
            const btnEmpLogin = document.getElementById('btn-emp-login');
            if (btnEmpLogin) {
                btnEmpLogin.onclick = () => {
                    const empId = document.getElementById('emp-select').value;
                    const pin = document.getElementById('emp-pin').value;
                    
                    if (!empId) return showModal('แจ้งเตือน', 'กรุณาเลือกชื่อพนักงาน');
                    if (!pin) return showModal('แจ้งเตือน', 'กรุณาระบุรหัส PIN');

                    const emp = employees.find(e => e.id === empId);
                    if (emp && emp.pin === pin) {
                        activeEmployee = emp;
                        changeView('emp-dash');
                        startClock();
                    } else {
                        showModal('รหัสผิดพลาด', 'รหัส PIN ไม่ถูกต้อง');
                    }
                };
            }

            // Emp Dash Actions
            const btnIn = document.getElementById('btn-clock-in');
            const btnOut = document.getElementById('btn-clock-out');
            if (btnIn) btnIn.onclick = () => processTimeLog('IN');
            if (btnOut) btnOut.onclick = () => processTimeLog('OUT');

            // Owner Login
            const btnOwnerLogin = document.getElementById('btn-owner-login');
            if (btnOwnerLogin) {
                btnOwnerLogin.onclick = () => {
                    const pin = document.getElementById('owner-pin').value;
                    if (pin === appSettings.ownerPin) {
                        changeView('owner-dash');
                    } else {
                        showModal('ปฏิเสธการเข้าถึง', 'รหัสผ่านเจ้าของร้านไม่ถูกต้อง');
                    }
                };
            }

            // Owner Dash: Employees
            const btnAddEmp = document.getElementById('btn-add-emp');
            if (btnAddEmp) {
                btnAddEmp.onclick = () => document.getElementById('add-emp-form').classList.remove('hidden');
            }
            const btnSaveEmp = document.getElementById('save-new-emp');
            if (btnSaveEmp) {
                btnSaveEmp.onclick = async () => {
                    const name = document.getElementById('new-emp-name').value.trim();
                    const pin = document.getElementById('new-emp-pin').value.trim();
                    if (!name || !pin) return showModal('แจ้งเตือน', 'กรุณากรอกข้อมูลให้ครบถ้วน');
                    if (pin.length < 4) return showModal('แจ้งเตือน', 'PIN ต้องมี 4 หลัก');

                    try {
                        const basePath = `artifacts/${appId}/public/data`;
                        await addDoc(collection(db, basePath, 'employees'), { name, pin });
                        document.getElementById('new-emp-name').value = '';
                        document.getElementById('new-emp-pin').value = '';
                        document.getElementById('add-emp-form').classList.add('hidden');
                        showModal('สำเร็จ', 'เพิ่มพนักงานเรียบร้อย');
                    } catch (e) {
                        showModal('ผิดพลาด', 'ไม่สามารถบันทึกได้');
                    }
                };
            }
            
            // Delete Emp
            document.querySelectorAll('[data-delete-emp]').forEach(btn => {
                btn.onclick = (e) => {
                    const id = e.currentTarget.getAttribute('data-delete-emp');
                    showModal('ยืนยันการลบ', 'คุณต้องการลบพนักงานคนนี้ใช่หรือไม่?', [
                        { text: 'ยกเลิก', type: 'white', action: closeModal },
                        { text: 'ลบ', type: 'danger', action: async () => {
                            try {
                                const basePath = `artifacts/${appId}/public/data`;
                                await deleteDoc(doc(db, basePath, 'employees', id));
                                closeModal();
                            } catch (error) {
                                showModal('ผิดพลาด', 'ไม่สามารถลบได้');
                            }
                        }}
                    ]);
                };
            });

            // Owner Dash: Settings
            const tglSelfie = document.getElementById('toggle-selfie');
            const tglGps = document.getElementById('toggle-gps');
            const saveSettings = async (updates) => {
                try {
                    const basePath = `artifacts/${appId}/public/data`;
                    await updateDoc(doc(db, basePath, 'config', 'appSettings'), updates);
                } catch(e) { console.error("Update setting failed", e); }
            };

            if (tglSelfie) tglSelfie.onchange = (e) => saveSettings({ requireSelfie: e.target.checked });
            if (tglGps) tglGps.onchange = (e) => saveSettings({ requireGPS: e.target.checked });

            const btnSavePin = document.getElementById('btn-save-owner-pin');
            if (btnSavePin) {
                btnSavePin.onclick = () => {
                    const newPin = document.getElementById('new-owner-pin').value.trim();
                    if(!newPin) return showModal('แจ้งเตือน', 'กรุณากรอกรหัสผ่านใหม่');
                    
                    showModal('ยืนยัน', 'ต้องการเปลี่ยนรหัสผ่านเจ้าของร้านใช่หรือไม่?', [
                        { text: 'ยกเลิก', type: 'white', action: closeModal },
                        { text: 'ยืนยัน', type: 'danger', action: async () => {
                            await saveSettings({ ownerPin: newPin });
                            closeModal();
                            document.getElementById('new-owner-pin').value = '';
                            showModal('สำเร็จ', 'เปลี่ยนรหัสผ่านเรียบร้อยแล้ว');
                        }}
                    ]);
                }
            }
        }

        // Live Clock for Emp Dash
        let clockInterval;
        function startClock() {
            if (clockInterval) clearInterval(clockInterval);
            const updateClock = () => {
                const el = document.getElementById('live-clock');
                if (el) {
                    const now = new Date();
                    el.innerText = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                }
            };
            updateClock();
            clockInterval = setInterval(updateClock, 1000);
        }

    </script>
</body>
</html>
