<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงเวลาพนักงาน</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .app-container { background: white; padding: 30px 20px; border-radius: 16px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); width: 100%; max-width: 350px; text-align: center; }
        h1 { font-size: 1.2em; color: #555; margin-top: 0; margin-bottom: 20px; }
        
        .login-box { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1em; font-family: 'Sarabun'; text-align: center; margin: 0 auto; box-sizing: border-box; }
        .btn-login { background-color: #2563eb; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 1em; font-weight: bold; font-family: 'Sarabun'; width: 90%; margin: 0 auto; transition: background 0.2s; }
        
        #userGreeting { color: #2563eb; font-weight: bold; margin-bottom: 5px; }
        .clock { font-size: 3em; font-weight: bold; color: #222; margin: 15px 0; }
        
        /* ปุ่มเข้า-ออกงานหลัก */
        .btn-group { display: flex; gap: 15px; margin-bottom: 15px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 12px; font-size: 1em; font-family: 'Sarabun', sans-serif; font-weight: bold; color: white; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-in { background-color: #10b981; } 
        .btn-out { background-color: #ef4444; } 
        
        /* ปุ่มฟีเจอร์เสริม (โอที/ลางาน) */
        .btn-group-sub { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn-ot { background-color: #f59e0b; padding: 10px; font-size: 0.9em; }
        .btn-leave { background-color: #8b5cf6; padding: 10px; font-size: 0.9em; }
        
        .btn-logout { background-color: #f3f4f6; color: #6b7280; padding: 10px; border-radius: 8px; font-size: 0.9em; margin-top: 10px; width: 100%; }
        
        .log-container { text-align: left; background: #f9fafb; padding: 15px; border-radius: 12px; font-size: 0.9em; max-height: 150px; overflow-y: auto; }
        .log-title { font-weight: bold; color: #666; margin-bottom: 10px; display: block; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .log-item { border-bottom: 1px dashed #e5e7eb; padding: 8px 0; display: flex; flex-direction: column; gap: 4px;}
        .log-item:last-child { border-bottom: none; }
        .loc { font-size: 0.8em; color: #888; }
    </style>
</head>
<body>

    <div class="app-container" id="loginScreen">
        <h1>เข้าสู่ระบบลงเวลา</h1>
        <div class="login-box">
            <input type="text" id="inputId" placeholder="รหัสพนักงาน (User)">
            <input type="password" id="inputPin" placeholder="รหัสผ่าน / PIN">
            <button class="btn-login" onclick="login()">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div class="app-container" id="mainScreen" style="display: none;">
        <div id="userGreeting">รหัสพนักงาน: <span id="displayId"></span></div>
        <div class="clock" id="clockDisplay">00:00</div>
        
        <div class="btn-group">
            <button class="btn-in" onclick="processRecord('เข้างาน', this, true)">เข้างาน</button>
            <button class="btn-out" onclick="processRecord('ออกงาน', this, true)">ออกงาน</button>
        </div>
        
        <div class="btn-group-sub">
            <button class="btn-ot" onclick="processRecord('โอที', this, true)">เริ่มโอที</button>
            <button class="btn-leave" onclick="processRecord('ลางาน', this, false)">แจ้งลางาน</button>
        </div>

        <div class="log-container">
            <span class="log-title">ประวัติการทำงาน</span>
            <div id="logList"></div>
        </div>

        <button class="btn-logout" onclick="logout()">ออกจากระบบ</button>
    </div>

    <script>
        // --- 🔴 ตั้งค่าระบบตรงนี้ ---
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyXuioI9v6FsX3lXZXej1_NXb-Mi8JYC_8JKSQH_8laQSud39ThLGm6X_1j38MiMNPv/exec';
        
        // พิกัดออฟฟิศของคุณ (ละติจูด, ลองจิจูด)
        const OFFICE_LAT = 13.736717; 
        const OFFICE_LON = 100.523186; 
        const ALLOWED_RADIUS = 100; // รัศมีที่อนุญาต (เมตร)

        let currentUser = "";
        let currentPin = "";

        // --- ระบบ Login/Logout (เหมือนเดิม) ---
        function login() {
            const id = document.getElementById('inputId').value.trim();
            const pin = document.getElementById('inputPin').value.trim();
            if(id === "" || pin === "") { alert("กรุณากรอกข้อมูลให้ครบถ้วน"); return; }
            currentUser = id; currentPin = pin;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
            document.getElementById('displayId').innerText = currentUser;
        }

        function logout() {
            currentUser = ""; currentPin = "";
            document.getElementById('inputId').value = ""; document.getElementById('inputPin').value = "";
            document.getElementById('mainScreen').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'block';
        }

        // --- ระบบนาฬิกา ---
        setInterval(() => {
            document.getElementById('clockDisplay').innerText = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }, 1000);

        // --- ฟังก์ชันคำนวณระยะทาง GPS (Haversine Formula) ---
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // รัศมีโลกเป็นเมตร
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; // คืนค่าเป็นเมตร
        }

        // --- ระบบประมวลผลเมื่อกดปุ่ม ---
        function processRecord(type, btnElement, requireGeofence) {
            let remark = "";
            
            // ถ้ากด "ลางาน" ให้เด้งหน้าต่างถามเหตุผล (และไม่ต้องเช็ค GPS)
            if(type === 'ลางาน') {
                remark = prompt("ระบุเหตุผลการลางาน (เช่น ป่วย, ลากิจ):");
                if(remark === null || remark.trim() === "") return; // ถ้ายกเลิกหรือไม่พิมพ์อะไร ให้หยุดการทำงาน
            }

            const originalText = btnElement.innerText;
            btnElement.innerText = "กำลังตรวจพิกัด...";
            btnElement.disabled = true;

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const userLat = position.coords.latitude;
                        const userLon = position.coords.longitude;
                        
                        // ตรวจสอบ Geofence (ถ้าปุ่มนั้นบังคับว่าต้องอยู่ออฟฟิศ)
                        if(requireGeofence) {
                            const distance = getDistance(OFFICE_LAT, OFFICE_LON, userLat, userLon);
                            if(distance > ALLOWED_RADIUS) {
                                alert(`คุณอยู่นอกพื้นที่ออฟฟิศ! (ห่างออกไป ${Math.round(distance)} เมตร)`);
                                btnElement.innerText = originalText;
                                btnElement.disabled = false;
                                return; // หยุดการทำงาน ไม่บันทึก
                            }
                        }

                        // ถ้าผ่านเงื่อนไข ให้บันทึกข้อมูล
                        const locText = `${userLat.toFixed(5)}, ${userLon.toFixed(5)}`;
                        saveData(type, locText, remark, btnElement, originalText);
                    },
                    (error) => {
                        alert("โปรดอนุญาตการเข้าถึงตำแหน่ง (GPS) ในการตั้งค่าเบราว์เซอร์");
                        btnElement.innerText = originalText;
                        btnElement.disabled = false;
                    },
                    { enableHighAccuracy: true } // บังคับดึง GPS แบบแม่นยำสูง
                );
            } else {
                alert("อุปกรณ์ของคุณไม่รองรับ GPS");
                btnElement.innerText = originalText;
                btnElement.disabled = false;
            }
        }

        // --- ส่งข้อมูลไป Google Sheets ---
        function saveData(type, location, remark, btnElement, originalText) {
            btnElement.innerText = "กำลังบันทึก...";
            const now = new Date();
            const dateStr = now.toLocaleDateString('th-TH');
            const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });

            const payload = { 
                date: dateStr, time: timeStr, type: type, 
                location: location, empId: currentUser, pin: currentPin, remark: remark 
            };

            fetch(SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                // อัปเดตหน้าจอ
                const logList = document.getElementById('logList');
                const logItem = `<div class="log-item">
                    <div><strong>${type}</strong> เวลา ${timeStr} น. ${remark ? `(${remark})` : ''}</div>
                </div>`;
                logList.innerHTML = logItem + logList.innerHTML;

                alert(`บันทึก [${type}] เรียบร้อยแล้ว`);
                btnElement.innerText = originalText;
                btnElement.disabled = false;
                logout(); // บันทึกเสร็จแล้วเด้งออกทันที
            }).catch((err) => {
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ");
                btnElement.innerText = originalText;
                btnElement.disabled = false;
            });
        }
    </script>
</body>
</html>
