<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time Tracker - ระบบบันทึกเวลา</title>
    <!-- Tailwind CSS สำหรับตกแต่ง UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 สำหรับแจ้งเตือนแบบสวยงาม -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- FontAwesome สำหรับไอคอน -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .hide { display: none !important; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        #camera-feed { object-fit: cover; border-radius: 0.5rem; transform: scaleX(-1); }
        .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: bold; }
        .tab-inactive { color: #6b7280; }
        .tab-inactive:hover { color: #374151; }
    </style>
</head>
<body class="text-gray-800 h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center z-10">
        <div class="text-xl font-bold"><i class="fa-solid fa-clock mr-2"></i>TimeTracker</div>
        <div id="user-info" class="hide flex items-center gap-4">
            <span id="user-name" class="text-sm hidden md:inline font-medium bg-blue-800 px-3 py-1 rounded-full"></span>
            <!-- ซ่อนปุ่มเปลี่ยนรหัสผ่านไว้ก่อน เพราะตอนนี้พนักงานใช้ PIN ส่วน Admin เปลี่ยนใน Firebase -->
            <button id="btn-logout" class="bg-rose-500 hover:bg-rose-600 px-3 py-1 rounded text-sm transition font-bold shadow">
                <i class="fa-solid fa-right-from-bracket mr-1"></i> ออกจากระบบ
            </button>
        </div>
    </nav>

    <!-- หน้าจอ Login -->
    <div id="view-login" class="flex-1 flex justify-center items-center p-4">
        <div class="glass-panel p-8 rounded-2xl shadow-xl w-full max-w-md">
            <div class="text-center mb-8">
                <div class="bg-blue-100 text-blue-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">
                    <i class="fa-solid fa-keyboard"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">เข้าสู่ระบบ</h2>
                <p class="text-gray-500 text-sm mt-1">กรุณากรอกรหัส PIN หรือล็อกอินผู้ดูแลระบบ</p>
            </div>
            
            <!-- ฟอร์มสำหรับ PIN (พนักงาน) -->
            <div id="form-pin" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1 text-center">รหัส PIN 6 หลัก</label>
                    <input type="password" id="login-pin" maxlength="6" inputmode="numeric" pattern="[0-9]*" class="w-full p-4 text-center text-3xl tracking-[0.5em] border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none placeholder:tracking-normal" placeholder="••••••">
                </div>
                <button id="btn-login-pin" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition shadow-lg mt-4 flex justify-center items-center">
                    <span>เข้าสู่ระบบด้วย PIN</span>
                </button>
                <div class="text-center mt-4">
                    <button id="toggle-to-admin" class="text-sm text-gray-500 hover:text-blue-600 underline">สำหรับผู้ดูแลระบบ</button>
                </div>
            </div>

            <!-- ฟอร์มสำหรับ Admin -->
            <div id="form-admin" class="space-y-4 hide">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">อีเมลผู้ดูแลระบบ</label>
                    <input type="email" id="login-email" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="admin@company.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่าน</label>
                    <input type="password" id="login-password" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="••••••••">
                </div>
                <button id="btn-login" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 rounded-lg transition shadow-lg mt-4 flex justify-center items-center">
                    <span>เข้าสู่ระบบแอดมิน</span>
                </button>
                <div class="text-center mt-4">
                    <button id="toggle-to-pin" class="text-sm text-gray-500 hover:text-blue-600 underline">กลับไปใช้รหัส PIN</button>
                </div>
            </div>
        </div>
    </div>

    <!-- หน้าจอ Employee (บันทึกเวลา) -->
    <div id="view-employee" class="hide flex-1 overflow-y-auto p-4 md:p-8">
        <div class="max-w-md mx-auto space-y-6">
            <!-- ส่วนกล้อง -->
            <div class="bg-white p-4 rounded-2xl shadow-md border border-gray-100">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="font-bold text-gray-700"><i class="fa-solid fa-camera text-blue-500 mr-2"></i>ถ่ายรูปยืนยันตัวตน</h3>
                    <span id="gps-status" class="text-xs bg-yellow-100 text-yellow-700 px-2 py-1 rounded-full"><i class="fa-solid fa-location-crosshairs fa-spin mr-1"></i>กำลังหาพิกัด...</span>
                </div>
                
                <div class="relative w-full aspect-[3/4] bg-gray-200 rounded-lg overflow-hidden mb-3 border-2 border-dashed border-gray-300 flex justify-center items-center">
                    <video id="camera-feed" class="w-full h-full object-cover absolute top-0 left-0" autoplay playsinline></video>
                    <img id="captured-photo" class="w-full h-full object-cover absolute top-0 left-0 hide" />
                    <div id="camera-placeholder" class="text-gray-400 flex flex-col items-center">
                        <i class="fa-solid fa-video-slash text-4xl mb-2"></i>
                        <span>ยังไม่ได้เปิดกล้อง</span>
                    </div>
                </div>

                <div class="flex gap-2">
                    <button id="btn-start-camera" class="flex-1 bg-gray-800 text-white py-2 rounded-lg text-sm hover:bg-gray-900 transition">
                        <i class="fa-solid fa-camera"></i> เปิดกล้อง
                    </button>
                    <button id="btn-snap" class="hide flex-1 bg-blue-600 text-white py-2 rounded-lg text-sm hover:bg-blue-700 transition">
                        <i class="fa-solid fa-bolt"></i> ถ่ายรูป
                    </button>
                    <button id="btn-retake" class="hide flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg text-sm hover:bg-gray-300 transition">
                        <i class="fa-solid fa-rotate-right"></i> ถ่ายใหม่
                    </button>
                </div>
                <canvas id="photo-canvas" class="hide"></canvas>
            </div>

            <!-- ปุ่มบันทึกเวลา -->
            <div class="grid grid-cols-2 gap-4">
                <button id="btn-checkin" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-2xl shadow-lg transition flex flex-col items-center disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    <i class="fa-solid fa-sign-in-alt text-2xl mb-1"></i>
                    <span>เข้างาน</span>
                </button>
                <button id="btn-checkout" class="bg-rose-500 hover:bg-rose-600 text-white font-bold py-4 rounded-2xl shadow-lg transition flex flex-col items-center disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    <i class="fa-solid fa-sign-out-alt text-2xl mb-1"></i>
                    <span>ออกงาน</span>
                </button>
            </div>
        </div>
    </div>

    <!-- หน้าจอ Admin (Dashboard) -->
    <div id="view-admin" class="hide flex-1 overflow-y-auto bg-gray-50 p-4 md:p-8">
        <div class="max-w-6xl mx-auto space-y-6">
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">แดชบอร์ดผู้ดูแลระบบ</h2>
                
                <!-- แท็บเมนู -->
                <div class="flex gap-6 border-b">
                    <button id="tab-timelogs" class="pb-2 px-1 tab-active focus:outline-none transition"><i class="fa-solid fa-list-ul mr-2"></i>ประวัติเข้าออก</button>
                    <button id="tab-employees" class="pb-2 px-1 tab-inactive focus:outline-none transition"><i class="fa-solid fa-users-gear mr-2"></i>จัดการพนักงาน</button>
                </div>
            </div>

            <!-- ส่วนข้อมูลบันทึกเวลา (Timelogs) -->
            <div id="section-timelogs" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-4 flex justify-end bg-gray-50 border-b">
                    <button id="btn-export-csv" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition shadow flex items-center">
                        <i class="fa-solid fa-file-excel mr-2"></i> Export Excel (CSV)
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-600 text-sm uppercase tracking-wider border-b">
                                <th class="p-4">เวลา</th>
                                <th class="p-4">พนักงาน</th>
                                <th class="p-4">ประเภท</th>
                                <th class="p-4">รูปถ่าย</th>
                                <th class="p-4">พิกัด GPS</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body" class="divide-y divide-gray-100">
                            <tr><td colspan="5" class="p-8 text-center text-gray-400">กำลังโหลดข้อมูล...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- ส่วนจัดการพนักงาน (Employees) -->
            <div id="section-employees" class="hide bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                <h3 class="text-lg font-bold text-gray-800 mb-4">เพิ่มพนักงานใหม่</h3>
                <div class="flex flex-col md:flex-row gap-4 mb-8">
                    <input type="text" id="new-emp-name" placeholder="ชื่อ-นามสกุล พนักงาน" class="flex-1 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="text" id="new-emp-pin" maxlength="6" inputmode="numeric" pattern="[0-9]*" placeholder="ตั้งรหัส PIN (6 หลัก)" class="md:w-48 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <button id="btn-add-employee" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold shadow transition flex items-center justify-center">
                        <i class="fa-solid fa-plus mr-2"></i> เพิ่ม
                    </button>
                </div>

                <h3 class="text-lg font-bold text-gray-800 mb-4">รายชื่อพนักงานในระบบ</h3>
                <div class="overflow-x-auto border rounded-lg">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-600 text-sm uppercase border-b">
                                <th class="p-4">ชื่อพนักงาน</th>
                                <th class="p-4">รหัส PIN</th>
                                <th class="p-4 text-center">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="employees-table-body" class="divide-y divide-gray-100">
                            <tr><td colspan="3" class="p-8 text-center text-gray-400">กำลังโหลดข้อมูล...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <!-- Firebase SDK (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        // เพิ่ม getDocs, where, doc, deleteDoc สำหรับจัดการพนักงาน
        import { getFirestore, collection, addDoc, query, where, getDocs, onSnapshot, orderBy, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAgTWrI1G1t3GYVz4-SPM7btrsixSe0el8",
            authDomain: "time-tracker-46283.firebaseapp.com",
            projectId: "time-tracker-46283",
            storageBucket: "time-tracker-46283.firebasestorage.app",
            messagingSenderId: "882533547295",
            appId: "1:882533547295:web:4b78bfc84322c58a50042a",
            measurementId: "G-5DPBNCSWFW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // State Variables
        let currentAdmin = null;
        let currentEmployee = null; // เก็บข้อมูลพนักงานจาก Firestore หรือ SessionStorage
        
        let currentLat = null;
        let currentLng = null;
        let capturedPhotoData = null;
        let stream = null;
        let adminUnsubscribe = null;
        let empUnsubscribe = null;

        // DOM Elements
        const views = {
            login: document.getElementById('view-login'),
            employee: document.getElementById('view-employee'),
            admin: document.getElementById('view-admin')
        };
        const navUserInfo = document.getElementById('user-info');
        const userNameSpan = document.getElementById('user-name');

        // สลับฟอร์ม Login
        document.getElementById('toggle-to-admin').addEventListener('click', () => {
            document.getElementById('form-pin').classList.add('hide');
            document.getElementById('form-admin').classList.remove('hide');
        });
        document.getElementById('toggle-to-pin').addEventListener('click', () => {
            document.getElementById('form-admin').classList.add('hide');
            document.getElementById('form-pin').classList.remove('hide');
        });

        // สลับแท็บในหน้าแอดมิน
        document.getElementById('tab-timelogs').addEventListener('click', (e) => {
            e.target.className = 'pb-2 px-1 tab-active focus:outline-none transition';
            document.getElementById('tab-employees').className = 'pb-2 px-1 tab-inactive focus:outline-none transition';
            document.getElementById('section-timelogs').classList.remove('hide');
            document.getElementById('section-employees').classList.add('hide');
        });
        document.getElementById('tab-employees').addEventListener('click', (e) => {
            e.target.className = 'pb-2 px-1 tab-active focus:outline-none transition';
            document.getElementById('tab-timelogs').className = 'pb-2 px-1 tab-inactive focus:outline-none transition';
            document.getElementById('section-employees').classList.remove('hide');
            document.getElementById('section-timelogs').classList.add('hide');
        });

        // ฟังก์ชันสลับหน้าจอหลัก
        function showView(viewName) {
            Object.values(views).forEach(v => v.classList.add('hide'));
            views[viewName].classList.remove('hide');
            
            if (viewName === 'login') {
                navUserInfo.classList.add('hide');
                stopCamera();
            } else {
                navUserInfo.classList.remove('hide');
                
                if (viewName === 'admin') {
                    userNameSpan.innerHTML = '<i class="fa-solid fa-crown text-yellow-300 mr-1"></i> ผู้ดูแลระบบ';
                    loadAdminTimelogs();
                    loadAdminEmployees();
                } else if (viewName === 'employee') {
                    userNameSpan.innerHTML = '<i class="fa-solid fa-user mr-1"></i> ' + currentEmployee.name;
                    initLocation();
                }
            }
        }

        // ==========================================
        // 1. ระบบ Authentication 
        // ==========================================
        
        // ตรวจสอบสถานะ Firebase Auth (สำหรับ Admin เท่านั้น)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // ถ้ามี user จาก Firebase Auth แสดงว่าเป็น Admin
                currentAdmin = user;
                showView('admin');
            } else {
                currentAdmin = null;
                // ถ้าไม่มี Auth ให้เช็คว่ามี พนักงานที่เคยล็อกอินด้วย PIN ค้างไว้ใน Session ไหม
                const savedEmp = sessionStorage.getItem('currentEmployeeData');
                if (savedEmp) {
                    currentEmployee = JSON.parse(savedEmp);
                    showView('employee');
                } else {
                    showView('login');
                }
            }
        });

        // ล็อกอินด้วย PIN (สำหรับพนักงาน - ดึงจาก Database)
        document.getElementById('btn-login-pin').addEventListener('click', async () => {
            const pin = document.getElementById('login-pin').value;
            const btn = document.getElementById('btn-login-pin');

            if (!pin || pin.length !== 6) {
                Swal.fire({ icon: 'warning', title: 'รหัสไม่ถูกต้อง', text: 'กรุณากรอกรหัส PIN ให้ครบ 6 หลัก' });
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังตรวจสอบ...';

            try {
                // ค้นหาพนักงานจาก Collection 'employees' ที่มี pin ตรงกัน
                const q = query(collection(db, "employees"), where("pin", "==", pin));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const empDoc = querySnapshot.docs[0];
                    currentEmployee = { id: empDoc.id, ...empDoc.data() };
                    
                    // บันทึกลง Session Storage (เพื่อให้รีเฟรชหน้าแล้วไม่หลุด จนกว่าจะปิดแท็บเบราว์เซอร์)
                    sessionStorage.setItem('currentEmployeeData', JSON.stringify(currentEmployee));
                    
                    Swal.fire({ icon: 'success', title: `ยินดีต้อนรับ`, text: currentEmployee.name, timer: 1500, showConfirmButton: false });
                    document.getElementById('login-pin').value = '';
                    showView('employee');
                } else {
                    Swal.fire({ icon: 'error', title: 'ล้มเหลว', text: 'รหัส PIN ไม่ถูกต้อง หรือไม่มีในระบบ' });
                }
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'เชื่อมต่อฐานข้อมูลล้มเหลว', text: error.message });
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'เข้าสู่ระบบด้วย PIN';
            }
        });

        // ล็อกอินด้วย Email (สำหรับแอดมิน - ใช้ Firebase Auth)
        document.getElementById('btn-login').addEventListener('click', async () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('btn-login');

            if (!email || !password) {
                Swal.fire({ icon: 'warning', title: 'ข้อมูลไม่ครบ', text: 'กรุณากรอกอีเมลและรหัสผ่าน' });
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังตรวจสอบ...';

            try {
                await signInWithEmailAndPassword(auth, email, password);
                Swal.fire({ icon: 'success', title: 'สำเร็จ', text: 'เข้าสู่ระบบเรียบร้อย', timer: 1500, showConfirmButton: false });
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'ล้มเหลว', text: 'อีเมลหรือรหัสผ่านไม่ถูกต้อง' });
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'เข้าสู่ระบบแอดมิน';
            }
        });

        // ออกจากระบบ
        document.getElementById('btn-logout').addEventListener('click', () => {
            Swal.fire({
                title: 'ออกจากระบบ?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#e11d48',
                confirmButtonText: 'ใช่, ออกจากระบบ',
                cancelButtonText: 'ยกเลิก'
            }).then((result) => {
                if (result.isConfirmed) {
                    // ล้าง Session ของพนักงาน
                    sessionStorage.removeItem('currentEmployeeData');
                    currentEmployee = null;
                    // ล้าง Auth ของ Admin
                    signOut(auth);
                    showView('login');
                }
            });
        });

        // ==========================================
        // 2. ระบบพนักงาน (กล้อง & GPS)
        // ==========================================
        
        function initLocation() {
            const statusEl = document.getElementById('gps-status');
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        currentLat = position.coords.latitude;
                        currentLng = position.coords.longitude;
                        statusEl.className = "text-xs bg-emerald-100 text-emerald-700 px-2 py-1 rounded-full";
                        statusEl.innerHTML = '<i class="fa-solid fa-check-circle mr-1"></i>พร้อมใช้งาน (พบพิกัด)';
                        checkReadyState();
                    },
                    (error) => {
                        statusEl.className = "text-xs bg-rose-100 text-rose-700 px-2 py-1 rounded-full";
                        statusEl.innerHTML = '<i class="fa-solid fa-triangle-exclamation mr-1"></i>ไม่สามารถดึงพิกัดได้';
                        Swal.fire({ icon: 'warning', title: 'ต้องการ GPS', text: 'กรุณาอนุญาตการเข้าถึง Location' });
                    },
                    { enableHighAccuracy: true }
                );
            }
        }

        const videoEl = document.getElementById('camera-feed');
        const imgEl = document.getElementById('captured-photo');
        const canvasEl = document.getElementById('photo-canvas');
        const placeholderEl = document.getElementById('camera-placeholder');

        const btnStartCam = document.getElementById('btn-start-camera');
        const btnSnap = document.getElementById('btn-snap');
        const btnRetake = document.getElementById('btn-retake');

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
                videoEl.srcObject = stream;
                
                videoEl.classList.remove('hide');
                placeholderEl.classList.add('hide');
                imgEl.classList.add('hide');
                
                btnStartCam.classList.add('hide');
                btnSnap.classList.remove('hide');
                btnRetake.classList.add('hide');
                
                capturedPhotoData = null;
                checkReadyState();
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'ไม่พบกล้อง', text: 'กรุณาอนุญาตการเข้าถึงกล้อง' });
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
        }

        function snapPhoto() {
            const targetWidth = 400; 
            const scale = targetWidth / videoEl.videoWidth;
            const targetHeight = videoEl.videoHeight * scale;

            canvasEl.width = targetWidth;
            canvasEl.height = targetHeight;
            const ctx = canvasEl.getContext('2d');
            
            ctx.translate(targetWidth, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(videoEl, 0, 0, targetWidth, targetHeight);
            
            capturedPhotoData = canvasEl.toDataURL('image/jpeg', 0.7);
            
            imgEl.src = capturedPhotoData;
            imgEl.classList.remove('hide');
            videoEl.classList.add('hide');
            
            btnSnap.classList.add('hide');
            btnRetake.classList.remove('hide');
            
            checkReadyState();
        }

        btnStartCam.addEventListener('click', startCamera);
        btnSnap.addEventListener('click', snapPhoto);
        btnRetake.addEventListener('click', () => {
            imgEl.classList.add('hide');
            videoEl.classList.remove('hide');
            btnSnap.classList.remove('hide');
            btnRetake.classList.add('hide');
            capturedPhotoData = null;
            checkReadyState();
        });

        function checkReadyState() {
            const btnIn = document.getElementById('btn-checkin');
            const btnOut = document.getElementById('btn-checkout');
            if (currentLat !== null && capturedPhotoData !== null) {
                btnIn.disabled = false;
                btnOut.disabled = false;
            } else {
                btnIn.disabled = true;
                btnOut.disabled = true;
            }
        }

        async function saveTimeLog(type) {
            const typeLabel = type === 'in' ? 'เข้างาน' : 'ออกงาน';
            
            Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                await addDoc(collection(db, "timelogs"), {
                    userId: currentEmployee.id, // ID จากเอกสารในคอลเลกชัน employees
                    name: currentEmployee.name, // บันทึกชื่อพนักงานไปด้วยเลยเพื่อให้ Admin อ่านง่าย
                    type: type,
                    timestamp: serverTimestamp(),
                    lat: currentLat,
                    lng: currentLng,
                    photoBase64: capturedPhotoData
                });

                Swal.fire({ icon: 'success', title: `บันทึกเวลา${typeLabel}สำเร็จ!`, confirmButtonColor: '#10b981' });
                btnRetake.click(); // Reset camera
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: error.message });
            }
        }

        document.getElementById('btn-checkin').addEventListener('click', () => saveTimeLog('in'));
        document.getElementById('btn-checkout').addEventListener('click', () => saveTimeLog('out'));


        // ==========================================
        // 3. ระบบ Admin (Dashboard & จัดการพนักงาน)
        // ==========================================
        
        let allLogsForExport = [];

        // --- โหลดข้อมูลเวลาเข้าออก ---
        function loadAdminTimelogs() {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-gray-400"><i class="fa-solid fa-spinner fa-spin mr-2"></i>กำลังดึงข้อมูล...</td></tr>';

            const q = query(collection(db, "timelogs"), orderBy("timestamp", "desc"));
            if (adminUnsubscribe) adminUnsubscribe(); 

            adminUnsubscribe = onSnapshot(q, (snapshot) => {
                allLogsForExport = [];
                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-gray-400">ยังไม่มีข้อมูลการบันทึกเวลา</td></tr>';
                    return;
                }

                let html = '';
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    let timeStr = 'กำลังประมวลผล...';
                    let exportTimeStr = '';
                    if (data.timestamp) {
                        const date = data.timestamp.toDate();
                        timeStr = date.toLocaleString('th-TH', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });
                        exportTimeStr = date.toLocaleString('en-GB'); 
                    }

                    const typeBadge = data.type === 'in' 
                        ? '<span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-bold">เข้างาน</span>'
                        : '<span class="bg-rose-100 text-rose-700 px-3 py-1 rounded-full text-xs font-bold">ออกงาน</span>';
                    const typeText = data.type === 'in' ? 'เข้างาน' : 'ออกงาน';
                    const empName = data.name || 'พนักงานไม่ทราบชื่อ';

                    allLogsForExport.push({ Date_Time: exportTimeStr, Employee: empName, Type: typeText, Lat: data.lat, Lng: data.lng });

                    html += `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="p-4 text-sm whitespace-nowrap">${timeStr}</td>
                            <td class="p-4 text-sm font-medium text-gray-800">${empName}</td>
                            <td class="p-4">${typeBadge}</td>
                            <td class="p-4">
                                <img src="${data.photoBase64}" class="w-12 h-12 rounded-lg object-cover border shadow-sm cursor-pointer hover:scale-150 transition-transform origin-left" alt="Selfie">
                            </td>
                            <td class="p-4 text-xs text-blue-600">
                                <a href="https://www.google.com/maps/search/?api=1&query=${data.lat},${data.lng}" target="_blank" class="hover:underline flex items-center">
                                    <i class="fa-solid fa-map-location-dot mr-1"></i>ดูแผนที่
                                </a>
                            </td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html;
            });
        }

        // Export CSV
        document.getElementById('btn-export-csv').addEventListener('click', () => {
            if (allLogsForExport.length === 0) return Swal.fire('ไม่มีข้อมูล', '', 'info');
            let csvContent = "data:text/csv;charset=utf-8,\uFEFFDate_Time,Employee,Type,Latitude,Longitude\n";
            allLogsForExport.forEach(row => { csvContent += `${row.Date_Time},${row.Employee},${row.Type},${row.Lat},${row.Lng}\n`; });
            const link = document.createElement("a");
            link.href = encodeURI(csvContent);
            link.download = `timelog_export_${new Date().getTime()}.csv`;
            link.click();
        });

        // --- โหลดรายชื่อพนักงาน ---
        function loadAdminEmployees() {
            const tbody = document.getElementById('employees-table-body');
            
            if (empUnsubscribe) empUnsubscribe();
            
            // ดึงรายชื่อพนักงานทั้งหมด (เรียงตามชื่อ)
            const q = query(collection(db, "employees"), orderBy("name"));
            empUnsubscribe = onSnapshot(q, (snapshot) => {
                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="3" class="p-8 text-center text-gray-400">ยังไม่มีรายชื่อพนักงานในระบบ</td></tr>';
                    return;
                }

                let html = '';
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    html += `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="p-4 text-sm font-medium text-gray-800">${data.name}</td>
                            <td class="p-4 text-sm tracking-widest font-mono text-blue-600 font-bold">${data.pin}</td>
                            <td class="p-4 text-center">
                                <button onclick="window.deleteEmployee('${doc.id}', '${data.name}')" class="text-rose-500 hover:text-rose-700 bg-rose-50 hover:bg-rose-100 p-2 rounded-lg transition">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html;
            });
        }

        // เพิ่มพนักงานใหม่
        document.getElementById('btn-add-employee').addEventListener('click', async () => {
            const nameInput = document.getElementById('new-emp-name');
            const pinInput = document.getElementById('new-emp-pin');
            const name = nameInput.value.trim();
            const pin = pinInput.value.trim();

            if (!name || !pin || pin.length !== 6) {
                return Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกชื่อ และตั้ง PIN 6 หลัก', 'warning');
            }

            try {
                // เช็คก่อนว่ามีรหัส PIN นี้ในระบบหรือยัง?
                const q = query(collection(db, "employees"), where("pin", "==", pin));
                const snapshot = await getDocs(q);
                
                if (!snapshot.empty) {
                    return Swal.fire('รหัส PIN ซ้ำ', 'รหัส PIN นี้ถูกใช้ไปแล้ว กรุณาเปลี่ยนรหัสใหม่', 'error');
                }

                // ถ้าไม่ซ้ำ ให้บันทึกลงฐานข้อมูล
                await addDoc(collection(db, "employees"), { name: name, pin: pin });
                
                Swal.fire({ icon: 'success', title: 'เพิ่มพนักงานสำเร็จ', timer: 1500, showConfirmButton: false });
                nameInput.value = '';
                pinInput.value = '';
            } catch (error) {
                Swal.fire('เกิดข้อผิดพลาด', error.message, 'error');
            }
        });

        // ลบพนักงาน (ใช้ window. function เพื่อให้ HTML เรียกใช้ได้จาก onclick)
        window.deleteEmployee = (docId, name) => {
            Swal.fire({
                title: `ลบพนักงาน ${name}?`,
                text: "ลบแล้วจะไม่สามารถใช้ PIN นี้ล็อกอินได้อีก (แต่ประวัติเข้าออกเดิมยังอยู่)",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e11d48',
                confirmButtonText: 'ลบข้อมูล'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    await deleteDoc(doc(db, "employees", docId));
                    Swal.fire({ icon: 'success', title: 'ลบสำเร็จ', timer: 1000, showConfirmButton: false });
                }
            });
        };

    </script>
</body>
