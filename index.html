<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมุดจดรายจ่าย AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #fdd835;
            --bg-color: #f4f4f9;
            --paper-color: #fff;
            --text-color: #333;
            --line-color: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .notepad {
            width: 100%;
            max-width: 420px;
            background: var(--paper-color);
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-top: 10px;
        }

        .header {
            background: var(--primary-color);
            padding: 15px 20px;
            font-weight: 600;
            font-size: 1.2rem;
            color: #424242;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-section {
            padding: 15px 20px;
            background: #fffdf2;
            border-bottom: 2px dashed #ccc;
        }

        .input-section input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        .input-section input:focus {
            border-color: #fbc02d;
        }

        .hint {
            display: block;
            font-size: 0.8rem;
            color: #888;
            margin-top: 8px;
        }

        .expense-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 50vh;
            overflow-y: auto;
            background: repeating-linear-gradient(
                var(--paper-color),
                var(--paper-color) 49px,
                var(--line-color) 50px
            );
        }

        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            height: 50px; /* Match background line height */
        }

        .item-text {
            flex-grow: 1;
            font-size: 16px;
            color: var(--text-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-price {
            font-weight: 600;
            color: #d32f2f;
            margin: 0 15px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff5252;
            font-size: 18px;
            cursor: pointer;
            padding: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: #aaa;
            font-size: 0.9rem;
        }

        .summary {
            background: #333;
            color: #fff;
            padding: 15px 20px;
            text-align: right;
            font-size: 1.2rem;
        }

        .summary span {
            font-weight: 600;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="notepad">
        <div class="header">
            <span>📝 สมุดจดรายจ่าย</span>
        </div>
        
        <div class="input-section">
            <input type="text" id="expenseInput" placeholder="เช่น ชาเย็น 20 หรือ ค่ารถ 50" autocomplete="off">
            <span class="hint">💡 พิมพ์รายการเว้นวรรคด้วยราคา แล้วกด Enter</span>
        </div>

        <ul class="expense-list" id="expenseList">
            <!-- รายการจะถูกเพิ่มที่นี่ -->
        </ul>

        <div class="summary">
            รวมทั้งหมด: <span id="totalAmount">0</span> บาท
        </div>
    </div>

    <script>
        // ดึงข้อมูลจาก Local Storage ถ้ามี
        let expenses = JSON.parse(localStorage.getItem('aiExpenses')) || [];
        
        const inputEl = document.getElementById('expenseInput');
        const listEl = document.getElementById('expenseList');
        const totalEl = document.getElementById('totalAmount');

        // ฟังก์ชันจำลอง AI เพื่อแยกชื่อรายการและราคา (Smart Parser)
        function aiParseExpense(text) {
            text = text.trim();
            // Regex หาข้อความ ตามด้วยตัวเลข (รองรับทศนิยม) และคำว่าบาท (มีหรือไม่มีก็ได้)
            const regex = /^(.*?)\s*(\d+(?:\.\d+)?)\s*(?:บาท|b|baht|฿)?$/i;
            const match = text.match(regex);

            if (match) {
                let itemName = match[1].trim();
                let itemPrice = parseFloat(match[2]);
                
                // ถ้าพิมพ์มาแค่ตัวเลข ไม่มีชื่อรายการ
                if (!itemName) itemName = "ไม่ระบุรายการ";

                return { name: itemName, price: itemPrice };
            }
            return null;
        }

        // ฟังก์ชันแสดงผลรายการบนหน้าจอ
        function renderExpenses() {
            listEl.innerHTML = '';
            let total = 0;

            if (expenses.length === 0) {
                listEl.innerHTML = '<div class="empty-state">ยังไม่มีรายการจดบันทึก ลองพิมพ์ด้านบนเลย!</div>';
            }

            expenses.forEach((exp, index) => {
                total += exp.price;

                const li = document.createElement('li');
                li.className = 'expense-item';
                li.innerHTML = `
                    <div class="item-text">${exp.name}</div>
                    <div class="item-price">${exp.price.toLocaleString()} ฿</div>
                    <button class="delete-btn" onclick="deleteExpense(${index})">×</button>
                `;
                listEl.appendChild(li);
            });

            // อัปเดตยอดรวม
            totalEl.innerText = total.toLocaleString();
            
            // เลื่อนลงไปล่างสุดเสมอ
            listEl.scrollTop = listEl.scrollHeight;
        }

        // ฟังก์ชันเพิ่มรายการ
        function addExpense() {
            const rawText = inputEl.value;
            if (!rawText) return;

            const parsedData = aiParseExpense(rawText);

            if (parsedData) {
                expenses.push(parsedData);
                saveData();
                renderExpenses();
                inputEl.value = ''; // เคลียร์ช่องแชท
            } else {
                alert("AI ไม่เข้าใจรูปแบบครับ ลองพิมพ์แบบนี้ดูนะ: 'ชาเย็น 20'");
            }
        }

        // ฟังก์ชันลบรายการ
        function deleteExpense(index) {
            expenses.splice(index, 1);
            saveData();
            renderExpenses();
        }

        // บันทึกลง Local Storage
        function saveData() {
            localStorage.setItem('aiExpenses', JSON.stringify(expenses));
        }

        // ดักจับการกดปุ่ม Enter
        inputEl.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                addExpense();
            }
        });

        // โหลดข้อมูลครั้งแรกเมื่อเปิดหน้า
        renderExpenses();
    </script>
</body>
</html>
